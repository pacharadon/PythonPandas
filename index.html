sql:`SELECT s.tier, SUM(o.gmv_usd) AS total_gmv\nFROM orders_regional o\nINNER JOIN seller_performance_metrics s ON o.shop_id = s.shop_id\nWHERE o.status = 'COMPLETED'\nGROUP BY s.tier\nORDER BY total_gmv DESC;`,
pandas:`m = o[o.status=='COMPLETED'].merge(s[['shop_id','tier']], on='shop_id')\nprint(m.groupby('tier')['gmv_usd'].sum().reset_index(name='total_gmv').sort_values('total_gmv', ascending=False))`,
explanation:"Cross-table aggregation. MALL tier should dominate due to their higher AOV; check whether your numbers reflect that."},

{n:17,sch:'shopee',cat:'joins',d:2,t:'Orders + Logistics',cmds:['LEFT JOIN'],
prompt:"For each order, show order_serial_number, gmv_usd, and the carrier (pl_name) — including orders with no shipment record yet.",
hint:"LEFT JOIN logistics_3pl. Some orders may not yet have a tracking record.",
sql:`SELECT o.order_serial_number, o.gmv_usd, l.pl_name\nFROM orders_regional o\nLEFT JOIN logistics_3pl l ON o.order_serial_number = l.order_serial_number;`,
pandas:`l = pd.read_sql("SELECT * FROM logistics_3pl", conn)\nm = o.merge(l[['order_serial_number','pl_name']], on='order_serial_number', how='left')\nprint(m[['order_serial_number','gmv_usd','pl_name']])`,
explanation:"LEFT JOIN keeps every order even if no shipment record. Useful for ops dashboards where pending pickups appear with NULL carrier."},

{n:18,sch:'shopee',cat:'joins',d:3,t:'Returns + Buyer Country',cmds:['INNER JOIN','chain'],
prompt:"For each return record, show return_id, reason, status, and the buyer's country. Need to chain returns → orders → users.",
hint:"Two INNER JOINs: returns→orders→users.",
sql:`SELECT r.return_id, r.reason, r.status, u.country\nFROM order_returns r\nINNER JOIN orders_regional o ON r.order_serial_number = o.order_serial_number\nINNER JOIN shopee_users u ON o.buyer_user_id = u.user_id;`,
pandas:`r = pd.read_sql("SELECT * FROM order_returns", conn)\nm = r.merge(o[['order_serial_number','buyer_user_id']], on='order_serial_number')\\\n     .merge(u[['user_id','country']], left_on='buyer_user_id', right_on='user_id')\nprint(m[['return_id','reason','status','country']])`,
explanation:"Chained joins are common when the link spans multiple hops."},

{n:19,sch:'shopee',cat:'joins',d:2,t:'Right Anti-Join: Sellers w/o Orders',cmds:['LEFT JOIN','IS NULL'],
prompt:"Find sellers who exist in seller_performance_metrics but have NEVER had an order placed. Return shop_id, shop_name.",
hint:"SQLite has no RIGHT JOIN — flip the tables and use LEFT JOIN.",
sql:`SELECT s.shop_id, s.shop_name\nFROM seller_performance_metrics s\nLEFT JOIN orders_regional o ON s.shop_id = o.shop_id\nWHERE o.order_serial_number IS NULL;`,
pandas:`m = s.merge(o[['shop_id']].drop_duplicates(), on='shop_id', how='left', indicator=True)\nprint(m[m._merge=='left_only'][['shop_id','shop_name']])`,
explanation:"In Postgres/MySQL you'd write `SELECT s.* FROM orders_regional o RIGHT JOIN seller_performance_metrics s ... WHERE o.order_serial_number IS NULL`. In SQLite, swap the tables and use LEFT JOIN — the result is identical.",
rule:"Always know which dialect you're on. SQLite, BigQuery don't support RIGHT JOIN. Postgres, MySQL, SQL Server do."},

// ============ SHOPEE — WINDOWS (20-24) ============
{n:20,sch:'shopee',cat:'windows',d:2,t:'Order Sequence per Buyer',cmds:['ROW_NUMBER','PARTITION BY'],
prompt:"Number each buyer's orders chronologically (1 = earliest). Return order_serial_number, buyer_user_id, create_time, order_seq.",
hint:"ROW_NUMBER() OVER (PARTITION BY buyer_user_id ORDER BY create_time).",
sql:`SELECT order_serial_number, buyer_user_id, create_time,\n       ROW_NUMBER() OVER (PARTITION BY buyer_user_id ORDER BY create_time) AS order_seq\nFROM orders_regional\nORDER BY buyer_user_id, order_seq;`,
pandas:`o2 = o.sort_values(['buyer_user_id','create_time'])\no2['order_seq'] = o2.groupby('buyer_user_id').cumcount() + 1\nprint(o2[['order_serial_number','buyer_user_id','create_time','order_seq']])`,
explanation:"PARTITION BY restarts numbering for each buyer. ORDER BY defines the sequence."},

{n:21,sch:'shopee',cat:'windows',d:3,t:'Top SKU per Order (Tie-Free)',cmds:['ROW_NUMBER','PARTITION'],
prompt:"For each shop, find the order with the highest GMV. Show shop_id, order_serial_number, gmv_usd. Return only the top per shop (no ties).",
hint:"ROW_NUMBER PARTITION BY shop_id ORDER BY gmv DESC, take rn=1.",
sql:`WITH r AS (\n  SELECT shop_id, order_serial_number, gmv_usd,\n         ROW_NUMBER() OVER (PARTITION BY shop_id ORDER BY gmv_usd DESC) AS rn\n  FROM orders_regional\n)\nSELECT shop_id, order_serial_number, gmv_usd FROM r WHERE rn = 1;`,
pandas:`top = o.sort_values(['shop_id','gmv_usd'], ascending=[True,False]).drop_duplicates('shop_id')\nprint(top[['shop_id','order_serial_number','gmv_usd']])`,
explanation:"Top-N-per-group via ROW_NUMBER is the canonical pattern. drop_duplicates after sort is the pandas one-liner."},

{n:22,sch:'shopee',cat:'windows',d:3,t:'Buyer GMV with DENSE_RANK',cmds:['DENSE_RANK','SUM'],
prompt:"Rank buyers by their lifetime completed GMV with no rank gaps after ties (DENSE_RANK). Return buyer_user_id, total_gmv, rk. Order by rk.",
hint:"Aggregate first, then DENSE_RANK on the totals.",
sql:`WITH s AS (\n  SELECT buyer_user_id, SUM(gmv_usd) AS total_gmv\n  FROM orders_regional WHERE status='COMPLETED' GROUP BY buyer_user_id\n)\nSELECT buyer_user_id, total_gmv,\n       DENSE_RANK() OVER (ORDER BY total_gmv DESC) AS rk\nFROM s ORDER BY rk;`,
pandas:`g = o[o.status=='COMPLETED'].groupby('buyer_user_id')['gmv_usd'].sum().reset_index(name='total_gmv')\ng['rk'] = g['total_gmv'].rank(method='dense', ascending=False).astype(int)\nprint(g.sort_values('rk'))`,
explanation:"DENSE_RANK = 1,2,2,3 (no gap after tie). RANK = 1,2,2,4 (skips). ROW_NUMBER = 1,2,3,4 (no ties).",
protip:"Use DENSE_RANK when you want top-N and ties matter. Use ROW_NUMBER when you need exactly one row per group."},

{n:23,sch:'shopee',cat:'windows',d:3,t:'Day-over-Day GMV',cmds:['LAG','date'],
prompt:"For daily total completed GMV across all of Shopee, show day, day_gmv, prev_day_gmv (yesterday's), and dod_delta. Use LAG.",
hint:"Aggregate to daily first in a CTE, then LAG ordered by day.",
sql:`WITH d AS (\n  SELECT DATE(create_time) AS day, SUM(gmv_usd) AS day_gmv\n  FROM orders_regional WHERE status='COMPLETED'\n  GROUP BY DATE(create_time)\n)\nSELECT day, day_gmv,\n       LAG(day_gmv) OVER (ORDER BY day) AS prev_day_gmv,\n       day_gmv - LAG(day_gmv) OVER (ORDER BY day) AS dod_delta\nFROM d ORDER BY day;`,
pandas:`o['day'] = pd.to_datetime(o.create_time).dt.date\nd = o[o.status=='COMPLETED'].groupby('day')['gmv_usd'].sum().reset_index(name='day_gmv').sort_values('day')\nd['prev_day_gmv'] = d['day_gmv'].shift(1)\nd['dod_delta'] = d['day_gmv'] - d['prev_day_gmv']\nprint(d)`,
explanation:"LAG is the one-arg way to peek at yesterday's row. DoD/MoM/YoY analyses always use LAG (or shift in pandas)."},

{n:24,sch:'shopee',cat:'windows',d:3,t:'Country Share of Global GMV',cmds:['SUM OVER ()'],
prompt:"For each country, show total completed GMV AND its share of global GMV (gmv / sum_of_all_gmv). Return country, total_gmv, share.",
hint:"SUM(...) OVER () with no PARTITION = global sum across all rows.",
sql:`WITH g AS (\n  SELECT country, SUM(gmv_usd) AS total_gmv\n  FROM orders_regional WHERE status='COMPLETED' GROUP BY country\n)\nSELECT country, total_gmv,\n       1.0 * total_gmv / SUM(total_gmv) OVER () AS share\nFROM g\nORDER BY share DESC;`,
pandas:`g = o[o.status=='COMPLETED'].groupby('country')['gmv_usd'].sum().reset_index(name='total_gmv')\ng['share'] = g['total_gmv'] / g['total_gmv'].sum()\nprint(g.sort_values('share', ascending=False))`,
explanation:"The empty OVER() is a 'window over the entire result set'. Useful for ratio-of-total."},

// ============ SHOPEE — CTE & SUBQUERIES (25-27) ============
{n:25,sch:'shopee',cat:'cte',d:2,t:'Big Spender Filter',cmds:['WITH','IN'],
prompt:"Who are the buyers who've spent over $200 lifetime (completed)? Return their user_id, username, country.",
hint:"CTE for big spenders, then join users.",
sql:`WITH big AS (\n  SELECT buyer_user_id FROM orders_regional\n  WHERE status='COMPLETED'\n  GROUP BY buyer_user_id HAVING SUM(gmv_usd) > 200\n)\nSELECT u.user_id, u.username, u.country\nFROM shopee_users u\nWHERE u.user_id IN (SELECT buyer_user_id FROM big);`,
pandas:`big = o[o.status=='COMPLETED'].groupby('buyer_user_id')['gmv_usd'].sum()\nbig_ids = big[big > 200].index\nprint(u[u.user_id.isin(big_ids)][['user_id','username','country']])`,
explanation:"CTEs make multi-step logic readable. The same logic with nested subqueries gets messy fast."},

{n:26,sch:'shopee',cat:'cte',d:3,t:'Margin per Order',cmds:['WITH','line revenue'],
prompt:"NOTE: This question requires a derived metric. Build a CTE that computes the avg gmv_usd per shop, then return shops where their avg ≥ overall avg. Return shop_id, avg_gmv.",
hint:"Two CTEs: shop_avg, overall_avg. Compare in main query.",
sql:`WITH shop_avg AS (\n  SELECT shop_id, AVG(gmv_usd) AS avg_gmv\n  FROM orders_regional WHERE status='COMPLETED' GROUP BY shop_id\n),\noverall AS (\n  SELECT AVG(gmv_usd) AS o_avg FROM orders_regional WHERE status='COMPLETED'\n)\nSELECT s.shop_id, s.avg_gmv\nFROM shop_avg s, overall\nWHERE s.avg_gmv >= overall.o_avg\nORDER BY s.avg_gmv DESC;`,
pandas:`completed = o[o.status=='COMPLETED']\nshop_avg = completed.groupby('shop_id')['gmv_usd'].mean()\noverall_avg = completed['gmv_usd'].mean()\nprint(shop_avg[shop_avg >= overall_avg].sort_values(ascending=False).reset_index(name='avg_gmv'))`,
explanation:"Comma-join (cross join) of a single-row CTE with a multi-row CTE is a clean pattern for 'compare each row to a global aggregate'."},

{n:27,sch:'shopee',cat:'cte',d:3,t:'Above Country Avg',cmds:['Correlated subquery'],
prompt:"Find orders whose gmv_usd is above the AVG GMV in the same country. Return order_serial_number, country, gmv_usd.",
hint:"Correlated subquery — inner aggregate filters by outer country.",
sql:`SELECT order_serial_number, country, gmv_usd\nFROM orders_regional o1\nWHERE gmv_usd > (\n  SELECT AVG(gmv_usd) FROM orders_regional o2\n  WHERE o2.country = o1.country AND o2.status = 'COMPLETED'\n)\nAND status = 'COMPLETED'\nORDER BY country, gmv_usd DESC;`,
pandas:`completed = o[o.status=='COMPLETED'].copy()\ncompleted['country_avg'] = completed.groupby('country')['gmv_usd'].transform('mean')\nprint(completed[completed.gmv_usd > completed.country_avg][['order_serial_number','country','gmv_usd']].sort_values(['country','gmv_usd'], ascending=[True,False]))`,
explanation:"Correlated subqueries reference the outer row. The inner re-runs per outer row. transform('mean') with groupby is the pandas analog (broadcasts mean back to original shape)."},

// ============ SHOPEE — CONDITIONAL (28-30) ============
{n:28,sch:'shopee',cat:'conditional',d:2,t:'Voucher Adoption Rate',cmds:['CASE','AVG'],
prompt:"Per country, what fraction of COMPLETED orders used a voucher? Return country, voucher_rate (decimal 0-1).",
hint:"AVG of CASE WHEN voucher_code IS NOT NULL THEN 1 ELSE 0.",
sql:`SELECT country,\n       AVG(CASE WHEN voucher_code IS NOT NULL THEN 1.0 ELSE 0 END) AS voucher_rate\nFROM orders_regional\nWHERE status = 'COMPLETED'\nGROUP BY country\nORDER BY voucher_rate DESC;`,
pandas:`completed = o[o.status=='COMPLETED'].copy()\ncompleted['used'] = completed.voucher_code.notna().astype(int)\nprint(completed.groupby('country')['used'].mean().reset_index(name='voucher_rate').sort_values('voucher_rate', ascending=False))`,
explanation:"Conditional aggregation: AVG of a 0/1 indicator gives the rate.",
protip:"This pattern beats two queries (count where voucher / total count). Always prefer one pass."},

{n:29,sch:'shopee',cat:'conditional',d:2,t:'Country×Status Pivot',cmds:['SUM(CASE)','pivot'],
prompt:"Pivot orders into a country×status matrix: per country, count of COMPLETED, SHIPPED, CANCELLED. Show country, n_completed, n_shipped, n_cancelled.",
hint:"SUM(CASE WHEN status=...) for each — the SQL pivot.",
sql:`SELECT country,\n       SUM(CASE WHEN status='COMPLETED' THEN 1 ELSE 0 END) AS n_completed,\n       SUM(CASE WHEN status='SHIPPED' THEN 1 ELSE 0 END) AS n_shipped,\n       SUM(CASE WHEN status='CANCELLED' THEN 1 ELSE 0 END) AS n_cancelled\nFROM orders_regional\nGROUP BY country;`,
pandas:`pd.crosstab(o.country, o.status)`,
explanation:"In SQL, pivoting = conditional aggregation. In pandas, pd.crosstab does it in one line.",
protip:"Some warehouses (Postgres, T-SQL) have native PIVOT/UNPIVOT. SQLite + most modern engines: SUM+CASE."},

{n:30,sch:'shopee',cat:'conditional',d:2,t:'Safe ROAS',cmds:['NULLIF'],
prompt:"For each ad, compute clicks/impressions safely (avoid divide by zero). Return ad_id, ctr.",
hint:"NULLIF(impressions, 0) returns NULL when impressions=0, making the divide return NULL instead of crashing.",
sql:`SELECT ad_id,\n       1.0 * clicks / NULLIF(impressions, 0) AS ctr\nFROM shopee_ads_performance;`,
pandas:`a = pd.read_sql("SELECT * FROM shopee_ads_performance", conn).copy()\na['ctr'] = a.apply(lambda r: r.clicks / r.impressions if r.impressions > 0 else None, axis=1)\nprint(a[['ad_id','ctr']])`,
explanation:"NULLIF is a tiny but vital function. Combine with COALESCE if you want 0 instead of NULL: COALESCE(x/NULLIF(y,0), 0).",
rule:"Division by zero behavior varies by engine. SQLite returns NULL, Postgres throws. NULLIF is the portable fix."},

// ============ SHOPEE — STRINGS & DATES (31-33) ============
{n:31,sch:'shopee',cat:'strings_dates',d:2,t:'Region from Order Serial',cmds:['SUBSTRING'],
prompt:"order_serial_number is formatted YYMMDD<region><seq>. Extract the date prefix (first 6 chars) and region (chars 7-9). Show order_serial_number, date_prefix, region.",
hint:"SUBSTR(string, start, length). SQL is 1-indexed.",
sql:`SELECT order_serial_number,\n       SUBSTR(order_serial_number, 1, 6) AS date_prefix,\n       SUBSTR(order_serial_number, 7, 3) AS region\nFROM orders_regional\nLIMIT 10;`,
pandas:`o['date_prefix'] = o.order_serial_number.str[:6]\no['region'] = o.order_serial_number.str[6:9]\nprint(o[['order_serial_number','date_prefix','region']].head(10))`,
explanation:"SUBSTR start at 1 in SQL. In pandas, .str[:N] uses 0-based slicing — different conventions, common bug source.",
rule:"SQL: 1-indexed. Python/pandas: 0-indexed. ALWAYS test off-by-one when porting between."},

{n:32,sch:'shopee',cat:'strings_dates',d:2,t:'SLA Days from Pickup',cmds:['julianday','date math'],
prompt:"Compute the actual delivery time (pod_time - pickup_time) in days for DELIVERED shipments. Return tracking_number, actual_days.",
hint:"julianday(end) - julianday(start) returns float days.",
sql:`SELECT tracking_number,\n       julianday(pod_time) - julianday(pickup_time) AS actual_days\nFROM logistics_3pl\nWHERE status = 'DELIVERED';`,
pandas:`l = pd.read_sql("SELECT * FROM logistics_3pl", conn)\nl[['pickup_time','pod_time']] = l[['pickup_time','pod_time']].apply(pd.to_datetime)\ndelivered = l[l.status=='DELIVERED'].copy()\ndelivered['actual_days'] = (delivered.pod_time - delivered.pickup_time).dt.total_seconds() / 86400\nprint(delivered[['tracking_number','actual_days']])`,
explanation:"In SQLite, julianday is the date diff workhorse. In MySQL, DATEDIFF (returns int days). In Postgres, end - start gives interval; EXTRACT(EPOCH FROM ...) for seconds."},

{n:33,sch:'shopee',cat:'strings_dates',d:2,t:'Username Cleaner',cmds:['LOWER','TRIM'],
prompt:"Standardize usernames: trim whitespace, lowercase. Return user_id, original username, clean_username.",
hint:"Chain TRIM and LOWER.",
sql:`SELECT user_id, username,\n       LOWER(TRIM(username)) AS clean_username\nFROM shopee_users;`,
pandas:`df['clean_username'] = df.username.str.strip().str.lower()\nprint(df[['user_id','username','clean_username']])`,
explanation:"Data cleanup canon. Order matters: TRIM first (case doesn't change whitespace), LOWER second."},

// ============ SHOPEE — ADVANCED (34-35) ============
{n:34,sch:'shopee',cat:'advanced',d:3,t:'GROUP_CONCAT Tracking',cmds:['GROUP_CONCAT'],
prompt:"For each shop, list all tracking_numbers as a comma-separated string. Return shop_id, all_trackings.",
hint:"GROUP_CONCAT after joining logistics to orders to get shop_id.",
sql:`SELECT o.shop_id, GROUP_CONCAT(l.tracking_number, ', ') AS all_trackings\nFROM orders_regional o\nINNER JOIN logistics_3pl l ON o.order_serial_number = l.order_serial_number\nGROUP BY o.shop_id;`,
pandas:`m = o.merge(l[['order_serial_number','tracking_number']], on='order_serial_number')\nprint(m.groupby('shop_id')['tracking_number'].agg(', '.join).reset_index(name='all_trackings'))`,
explanation:"GROUP_CONCAT (SQLite/MySQL) = STRING_AGG (Postgres/SQL Server). Both collapse many rows into one comma-separated string."},

{n:35,sch:'shopee',cat:'advanced',d:3,t:'Returns w/ Buyer Tier',cmds:['UNION ALL','complex'],
prompt:"Build a unified per-buyer activity log: each row is one event (order or return). Columns: user_id, event_type, event_time, amount. Use UNION ALL.",
hint:"Two SELECTs same column shape, UNION ALL.",
sql:`SELECT o.buyer_user_id AS user_id, 'order' AS event_type, o.create_time AS event_time, o.gmv_usd AS amount\nFROM orders_regional o\nUNION ALL\nSELECT o.buyer_user_id, 'return', r.judge_time, r.refund_amount_usd\nFROM order_returns r INNER JOIN orders_regional o ON r.order_serial_number = o.order_serial_number\nORDER BY user_id, event_time;`,
pandas:`r = pd.read_sql("SELECT * FROM order_returns", conn)\nev1 = o[['buyer_user_id','create_time','gmv_usd']].rename(columns={'buyer_user_id':'user_id','create_time':'event_time','gmv_usd':'amount'})\nev1['event_type'] = 'order'\nev2 = r.merge(o[['order_serial_number','buyer_user_id']], on='order_serial_number')\nev2 = ev2[['buyer_user_id','judge_time','refund_amount_usd']].rename(columns={'buyer_user_id':'user_id','judge_time':'event_time','refund_amount_usd':'amount'})\nev2['event_type'] = 'return'\nprint(pd.concat([ev1, ev2], ignore_index=True).sort_values(['user_id','event_time']))`,
explanation:"UNION ALL stacks rows; columns must align. In pandas, pd.concat with axis=0 (default) does the same.",
protip:"Use UNION ALL (faster, no dedup) over UNION unless you specifically need to remove duplicates."},

// ============ LAZADA — AGGREGATION (42-46) ============
{n:42,sch:'lazada',cat:'aggregation',d:2,t:'GMV by LazMall vs Non-LazMall',cmds:['JOIN','GROUP BY'],
prompt:"Sum delivered order revenue split by whether the seller is LazMall. Need to chain orders → order_lines → products → sellers. Return is_lazmall, total_revenue.",
hint:"4-table join. SUM line_value.",
sql:`SELECT s.is_lazmall, SUM(ol.line_value) AS total_revenue\nFROM lazada_orders o\nINNER JOIN order_lines ol ON o.order_id = ol.order_id\nINNER JOIN products_catalog p ON ol.product_id = p.product_id\nINNER JOIN lazmall_sellers s ON p.seller_id = s.seller_id\nWHERE o.status = 'delivered'\nGROUP BY s.is_lazmall;`,
pandas:`ol = pd.read_sql("SELECT * FROM order_lines", conn)\np = pd.read_sql("SELECT * FROM products_catalog", conn)\ns = pd.read_sql("SELECT * FROM lazmall_sellers", conn)\nm = lo[lo.status=='delivered'].merge(ol, on='order_id').merge(p[['product_id','seller_id']], on='product_id').merge(s[['seller_id','is_lazmall']], on='seller_id')\nprint(m.groupby('is_lazmall')['line_value'].sum().reset_index(name='total_revenue'))`,
explanation:"LazMall sellers tend to have higher AOV. This split is a key competitive metric versus Shopee Mall."},

const dbCache = {};

function compareResults(userR, expR) {
  if (!userR && !expR) return true;
  if (!userR || !expR) return false;
  if (userR.columns.length !== expR.columns.length) return false;
  if (userR.values.length !== expR.values.length) return false;
  const matchAsIs = userR.values.every((row, i) => row.every((cell, j) => String(cell) === String(expR.values[i][j])));
  if (matchAsIs) return true;
  const k = rs => rs.values.map(r => r.map(c => String(c)).join('|')).sort();
  const a = k(userR), b = k(expR);
  return a.length === b.length && a.every((v,i) => v === b[i]);
}
// Reorder a result's columns alphabetically by name (preserving cell association).
function sortCols(rs) {
  if (!rs || !rs.columns) return rs;
  const idx = rs.columns.map((_, i) => i).sort((x, y) => String(rs.columns[x]).localeCompare(String(rs.columns[y])));
  return { columns: idx.map(i => rs.columns[i]), values: rs.values.map(r => idx.map(i => r[i])) };
}
// Grade leniently: rows are order-insensitive (compareResults). If columns just
// differ in order but the names match as a set, retry with both sorted by name.
function gradedMatch(user, exp) {
  if (compareResults(user, exp)) return true;
  const cu = ((user && user.columns) || []).map(String).slice().sort();
  const ce = ((exp && exp.columns) || []).map(String).slice().sort();
  if (cu.length === ce.length && cu.every((v, i) => v === ce[i])) {
    return compareResults(sortCols(user), sortCols(exp));
  }
  return false;
}
// Normalise a cell so equivalent values compare equal: numbers round to 6 dp
// (45 == 45.0, float noise absorbed), null/empty are explicit.
function normCell(c) {
  if (c === null || c === undefined) return '␀null';
  if (c === '') return '␀empty';
  const n = Number(c);
  const s = (typeof c === 'boolean' || Number.isNaN(n)) ? String(c) : String(Math.round(n * 1e6) / 1e6);
  return s + '␟';
}
function permute(arr) {
  if (arr.length <= 1) return [arr];
  const res = [];
  arr.forEach((v, i) => { for (const p of permute([...arr.slice(0, i), ...arr.slice(i + 1)])) res.push([v, ...p]); });
  return res;
}
// True if `user` holds the same data as `exp`, independent of ROW order,
// COLUMN order, and trivial numeric formatting. Column count <= ~6 so trying
// every column permutation is cheap — this is what makes the grader open to
// many different-but-equivalent pandas answers.
function tableMatch(user, exp) {
  if (!user || !exp || !user.columns || !exp.columns) return false;
  if (user.columns.length !== exp.columns.length) return false;
  if (user.values.length !== exp.values.length) return false;
  const ncol = exp.columns.length;
  const expKeys = exp.values.map(r => r.map(normCell).join('')).sort();
  if (ncol > 6) {
    const userKeys = user.values.map(r => r.map(normCell).join('')).sort();
    return userKeys.every((v, i) => v === expKeys[i]);
  }
  for (const perm of permute([...Array(ncol).keys()])) {
    const userKeys = user.values.map(r => perm.map(i => normCell(r[i])).join('')).sort();
    if (userKeys.every((v, i) => v === expKeys[i])) return true;
  }
  return false;
}
function anyMatch(candidates, exp) {
  return (candidates || []).some(c => tableMatch(c, exp));
}
// Grade a concept "try this yourself" run. `expect` (on the lesson) can be:
//   {error:true}   must raise (predict-the-error lessons)
//   {chart:true}   must draw a figure
//   {stdout:'...'} stdout must contain this (whitespace-normalised)
//   undefined      must just run cleanly
function normOut(s) { return String(s || '').replace(/\s+/g, ' ').trim().toLowerCase(); }
function checkConcept(expect, sig) {
  if (!sig) return { pass: false, why: 'No result.' };
  const e = expect || {};
  if (e.error) return sig.errored ? { pass: true } : { pass: false, why: 'This one is supposed to raise an error — run it and read the traceback.' };
  if (sig.errored) return { pass: false, why: 'Your code raised an error. Read the last line of the traceback and fix it.' };
  if (e.chart) return sig.hasChart ? { pass: true } : { pass: false, why: 'No chart was drawn. Make sure you call a plot function (e.g. plt.plot / plt.bar).' };
  if (e.stdout != null) return normOut(sig.stdout).includes(normOut(e.stdout)) ? { pass: true } : { pass: false, why: 'The output is not what this lesson is looking for yet.' };
  return { pass: true }; // ran cleanly, no stricter expectation
}
function diffMask(userR, expR) {
  if (!userR || !expR) return null;
  const rows = Math.max(userR.values.length, expR.values.length);
  const cols = Math.max(userR.columns.length, expR.columns.length);
  const mask = [];
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      const u = userR.values[r]?.[c];
      const e = expR.values[r]?.[c];
      row.push(String(u) !== String(e));
    }
    mask.push(row);
  }
  return mask;
}

// Build TASKS in this order:
//   1. Setup concept (pandas basics)
//   2. All 8 SQL concept lessons (Foundations → Advanced)
//   3. All Shopee questions sorted EASY → HARD
//   4. All Lazada questions sorted EASY → HARD
//   5. All Agoda questions sorted EASY → HARD
const TASKS = (() => {
  const out = [];
  // Section 1: Setup
  if (CONCEPTS.setup) out.push({ type:'concept', cat:'setup', ...CONCEPTS.setup });
  // Section 2: concept lessons. Skip 'setup' (already added) and the legacy
  // SQL teaching lessons — this course is pandas-first now.
  const SQL_CONCEPTS = new Set(['foundations','aggregation','joins','windows','cte','conditional','strings_dates','advanced']);
  for (const cat of CATEGORY_ORDER) {
    if (cat === 'setup' || SQL_CONCEPTS.has(cat)) continue;
    if (CONCEPTS[cat]) out.push({ type:'concept', cat, ...CONCEPTS[cat] });
  }
  // Section 3-5: Per-schema quiz blocks, sorted easy → hard within each schema
  for (const sch of SCHEMA_ORDER) {
    const qs = QUESTIONS.filter(q => q.sch === sch).sort((a, b) => {
      if (a.d !== b.d) return a.d - b.d;                      // difficulty asc
      const ca = CATEGORY_ORDER.indexOf(a.cat);
      const cb = CATEGORY_ORDER.indexOf(b.cat);
      if (ca !== cb) return ca - cb;                          // category order
      return a.n - b.n;                                       // original n as tiebreaker
    });
    out.push(...qs);
  }
  out.forEach((t, i) => { t.pos = i + 1; });
  return out;
})();

// Sidebar tree: section-based grouping (Lessons / Shopee / Lazada / Agoda)
const SIDEBAR_TREE = (() => {
  const tree = { 'Lessons': [], 'Shopee': [], 'Lazada': [], 'Agoda': [] };
  for (const t of TASKS) {
    if (t.type === 'concept') tree['Lessons'].push(t);
    else if (t.sch === 'shopee') tree['Shopee'].push(t);
    else if (t.sch === 'lazada') tree['Lazada'].push(t);
    else if (t.sch === 'agoda') tree['Agoda'].push(t);
  }
  return tree;
})();

    snake: <><path d="M19 12c-3 0-3-4-6-4s-3 4-6 4-3-4-6-4"/><path d="M19 16c-3 0-3-4-6-4s-3 4-6 4-3-4-6-4"/></>,
    warn: <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
    lightbulb: <><path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5C17.7 10.2 18.5 8.5 18.5 7a6.5 6.5 0 0 0-13 0c0 1.5.8 3.2 2 4.5.76.76 1.23 1.52 1.41 2.5"/></>,
  };
  return <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{paths[name] || null}</svg>;
};

function Sidebar({ idx, setIdx, solved }) {
  return (
    <aside className="w-72 bg-white border-r border-slate-200 flex flex-col flex-shrink-0 overflow-hidden">
      <div className="px-5 py-4 border-b border-slate-200">
        <div className="flex items-center gap-2">
          <div className="w-7 h-7 bg-gradient-to-br from-orange-500 to-pink-500 rounded flex items-center justify-center text-white text-[10px] font-black">PD</div>
          <h1 className="font-bold text-slate-900 text-sm leading-tight">PacharaDon's<br/><span className="text-orange-600">PythonPandas Bootcamp</span></h1>
        </div>
        <p className="text-[10px] text-slate-500 mt-1">{TASKS.length} tasks · 11 lessons · 3 schemas</p>
      </div>
      <nav className="flex-1 overflow-y-auto py-3 px-2">
        {Object.entries(SIDEBAR_TREE).map(([sectionName, tasks]) => {
          if (tasks.length === 0) return null;
          const isLessons = sectionName === 'Lessons';
          const sectionSolved = tasks.filter(t => t.type !== 'concept' && solved.has(t.pos)).length;
          const sectionTotal = tasks.filter(t => t.type !== 'concept').length;
          // For schema sections, get the accent color
          const firstTask = tasks.find(t => t.type !== 'concept');
          const meta = firstTask ? SCHEMAS[firstTask.sch] : null;
          return (
            <div key={sectionName} className="mb-4">
              <div className="px-2 py-1.5 flex items-center justify-between border-b border-slate-100">
                <div className="flex items-center gap-2">
                  {!isLessons && meta && <div className={`w-2 h-2 rounded-full ${ACCENT_PILL[meta.accent]}`}/>}
                  {isLessons && <span className="text-purple-500">★</span>}
                  <span className="text-xs font-bold text-slate-700 uppercase tracking-wide">{sectionName}</span>
                </div>
                {!isLessons && <span className="text-[10px] text-slate-400">{sectionSolved}/{sectionTotal}</span>}
              </div>
              <ul className="mt-1">
                {tasks.map(t => {
                  const isActive = idx === t.pos - 1;
                  const isConcept = t.type === 'concept';
                  const isSolved = !isConcept && solved.has(t.pos);
                  const tMeta = isConcept ? null : SCHEMAS[t.sch];
                  const diffPip = !isConcept ? (t.d === 1 ? 'bg-emerald-400' : t.d === 2 ? 'bg-yellow-400' : 'bg-red-400') : '';
                  return (
                    <li key={t.pos}>
                      <button onClick={() => setIdx(t.pos - 1)}
                        className={`w-full text-left px-2.5 py-1.5 text-xs rounded flex items-center gap-2 ${isActive ? (isConcept ? 'bg-purple-50 text-purple-700 font-semibold' : `bg-${tMeta.accent}-50 ${ACCENT_TEXT[tMeta.accent]} font-semibold`) : 'text-slate-600 hover:bg-slate-50'}`}>
                        <span className={`w-5 h-5 flex items-center justify-center text-[10px] font-bold rounded flex-shrink-0 ${
                          isConcept ? 'bg-purple-500 text-white' :
                          isSolved ? 'bg-emerald-500 text-white' :
                          isActive ? `${ACCENT_PILL[tMeta.accent]} text-white` :
                          'bg-slate-100 text-slate-500'
                        }`}>
                          {isConcept ? '★' : isSolved ? '✓' : t.pos}
                        </span>
                        <span className="flex-1 truncate">{isConcept ? t.t : t.t}</span>
                        {!isConcept && <span className={`w-1.5 h-1.5 rounded-full ${diffPip}`} title={`Difficulty ${t.d}`}/>}
                      </button>
                    </li>
                  );
                })}
              </ul>
            </div>
          );
        })}
      </nav>
    </aside>
  );
}

function ConceptPanel({ q, onSkipTopic, hasNextTopic }) {
  const [compact, setCompact] = useState(() => localStorage.getItem('lesson_compact') === '1');
  const [hintLevel, setHintLevel] = useState(0);
  const exampleSchema = (q.example && q.example.schema) || 'shopee';
  const progressInfo = q.pandas_progress !== undefined
    ? { pct: q.pandas_progress, label: 'Pandas readiness' }
    : q.chart_progress !== undefined
      ? { pct: q.chart_progress, label: 'Charting readiness' }
      : null;

  // Reset hint level when lesson changes
  useEffect(() => { setHintLevel(0); }, [q.t]);

  const toggleCompact = () => {
    const next = !compact;
    setCompact(next);
    localStorage.setItem('lesson_compact', next ? '1' : '0');
  };

  return (
    <div className="p-6 overflow-y-auto h-full">
      {/* Header row */}
      <div className="flex items-center justify-between gap-2 mb-3">
        <div className="flex items-center gap-2">
          <span className="bg-purple-100 text-purple-700 text-xs font-bold tracking-wide px-2.5 py-1 rounded border border-purple-200">★ LESSON</span>
          <span className="text-xs text-slate-500">Read this before the quiz starts</span>
        </div>
        <div className="flex items-center gap-1.5">
          <button onClick={toggleCompact}
            className="text-[10px] text-slate-600 hover:text-slate-900 hover:bg-slate-100 border border-slate-200 px-2 py-1 rounded">
            {compact ? 'Expand' : 'Compact'}
          </button>
          {hasNextTopic && (
            <button onClick={onSkipTopic}
              className="text-[10px] text-slate-600 hover:text-slate-900 hover:bg-slate-100 border border-slate-200 px-2 py-1 rounded">
              Skip topic →
            </button>
          )}
        </div>
      </div>

      <h2 className="text-2xl font-bold text-slate-900 mb-4">{q.t}</h2>

      {/* Progress bar (Python OR Charting lessons) */}
      {progressInfo && (
        <div className="mb-5 bg-slate-50 border border-slate-200 rounded p-3">
          <div className="flex items-center justify-between mb-1.5">
            <span className="text-[10px] font-bold uppercase tracking-wider text-slate-500">{progressInfo.label}</span>
            <span className="text-xs font-bold text-slate-900">{progressInfo.pct}%</span>
          </div>
          <div className="h-1.5 bg-slate-200 rounded-full overflow-hidden">
            <div className="h-full bg-slate-900 transition-all" style={{ width: progressInfo.pct + '%' }} />
          </div>
        </div>
      )}

      {/* Why pandas / why charting needs this */}
      {(q.why_pandas || q.why_chart) && (
        <section className="mb-5 bg-amber-50 border border-amber-200 rounded p-3">
          <div className="text-[10px] font-bold uppercase tracking-wider text-amber-700 mb-1">{q.why_pandas ? 'Why pandas needs this' : 'Why charting needs this'}</div>
          <p className="text-sm text-amber-900 leading-relaxed">{q.why_pandas || q.why_chart}</p>
        </section>
      )}

      {/* What it does */}
      {q.what && (
        <section className="mb-5">
          <h3 className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">What it does</h3>
          <p className="text-slate-700 leading-relaxed whitespace-pre-line">{q.what}</p>
        </section>
      )}

      {/* Worked examples */}
      {q.examples && q.examples.length > 0 && (
        <section className="mb-5">
          <h3 className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Worked examples</h3>
          <div className="space-y-2.5">
            {q.examples.map((ex, i) => (
              <div key={i}>
                {ex.note && <p className="text-xs text-slate-600 mb-1">{ex.note}</p>}
                <pre className="bg-slate-900 text-slate-100 rounded p-2.5 text-xs code whitespace-pre-wrap leading-relaxed">{ex.code}</pre>
              </div>
            ))}
          </div>
        </section>
      )}

      {/* When to use (SQL lessons) */}
      {q.when && (
        <section className="mb-5">
          <h3 className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">When to use</h3>
          <p className="text-slate-700 leading-relaxed">{q.when}</p>
        </section>
      )}

      {/* Tables involved (SQL lessons) */}
      {q.tables_involved && (
        <section className="mb-5">
          <h3 className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">Tables involved</h3>
          <p className="text-slate-700 leading-relaxed">{q.tables_involved}</p>
        </section>
      )}

      {/* Written / Execution order (SQL lessons) */}
      {q.written_order && q.exec_order && (
        <section className="mb-5 grid grid-cols-2 gap-3">
          <div className="bg-blue-50 border border-blue-200 rounded p-3">
            <div className="text-[10px] font-bold uppercase tracking-wider text-blue-700 mb-1">Written order (you type)</div>
            <ul className="text-xs code text-blue-900 space-y-0.5">
              {q.written_order.map((s, i) => <li key={i}>{i+1}. {s}</li>)}
            </ul>
          </div>
          <div className="bg-amber-50 border border-amber-200 rounded p-3">
            <div className="text-[10px] font-bold uppercase tracking-wider text-amber-700 mb-1">Execution order (engine runs)</div>
            <ul className="text-xs code text-amber-900 space-y-0.5">
              {q.exec_order.map((s, i) => <li key={i}>{i+1}. {s}</li>)}
            </ul>
          </div>
        </section>
      )}

      {/* Pandas equivalent code (SQL lessons) */}
      {q.pandas && (
        <section className="mb-5">
          <h3 className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5 flex items-center gap-1">
            <Icon name="snake" className="w-3 h-3"/> Pandas equivalent
          </h3>
          <pre className="bg-slate-900 text-slate-100 rounded p-3 text-xs code whitespace-pre-wrap leading-relaxed">{q.pandas}</pre>
        </section>
      )}

      {/* Glossary */}
      {!compact && q.glossary && q.glossary.length > 0 && (
        <section className="mb-5">
          <h3 className="text-xs font-bold uppercase tracking-wider text-slate-500 mb-2">Glossary</h3>
          <dl className="text-sm space-y-1.5">
            {q.glossary.map((g, i) => (
              <div key={i} className="grid grid-cols-[auto,1fr] gap-2 items-baseline">
                <dt className="font-mono font-bold text-purple-700 text-xs whitespace-nowrap">{g.term}</dt>
                <dd className="text-slate-700 text-xs">{g.defn || g.def}</dd>
              </div>
            ))}
          </dl>
        </section>
      )}

      {/* Rules / Gotchas */}
      {!compact && (q.rules || q.gotchas) && (
        <section className="mb-5">
          <h3 className="text-xs font-bold uppercase tracking-wider text-red-700 mb-2 flex items-center gap-1">
            <Icon name="warn" className="w-3 h-3"/> Rules &amp; gotchas
          </h3>
          <ul className="text-sm text-slate-800 space-y-1">
            {(q.rules || q.gotchas).map((r, i) => (
              <li key={i} className="flex gap-2"><span className="text-red-500 flex-shrink-0">▸</span><span>{r}</span></li>
            ))}
          </ul>
        </section>
      )}

      {/* Try yourself (Python lessons) */}
      {q.try_yourself && (
        <section className="mb-5 bg-lotus-green/25 border border-lotus-green rounded p-4">
          <h3 className="text-xs font-bold uppercase tracking-wider text-lotus-brown mb-2">Try this yourself</h3>
          <p className="text-sm text-slate-800 leading-relaxed mb-2">{q.try_yourself.prompt}</p>
          {q.try_yourself.starter_py && (
            <pre className="bg-slate-900 text-slate-100 rounded p-2.5 text-xs code whitespace-pre-wrap leading-relaxed mb-2">{q.try_yourself.starter_py}</pre>
          )}
          {q.try_hints && q.try_hints.length > 0 && (
            <div>
              {hintLevel < q.try_hints.length ? (
                <button onClick={() => setHintLevel(hintLevel + 1)}
                  className="text-[11px] bg-white border border-slate-300 hover:border-slate-500 text-slate-700 px-2.5 py-1 rounded font-medium">
                  Reveal hint ({hintLevel + 1}/{q.try_hints.length})
                </button>
              ) : (
                <button onClick={() => setHintLevel(0)}
                  className="text-[11px] text-slate-500 hover:text-slate-900 underline">
                  Hide hints
                </button>
              )}
              {hintLevel > 0 && (
                <ul className="mt-2 space-y-1">
                  {q.try_hints.slice(0, hintLevel).map((h, i) => (
                    <li key={i} className="text-xs text-slate-700 bg-white border border-slate-200 rounded px-2.5 py-1.5">
                      <span className="text-[9px] font-bold uppercase tracking-wider text-slate-400 mr-1.5">
                        {i === 0 ? 'Nudge' : i === q.try_hints.length - 1 ? 'Answer' : 'Bigger hint'}
                      </span>
                      {h}
                    </li>
                  ))}
                </ul>
              )}
            </div>
          )}
        </section>
      )}

      {/* Runnable example — hidden in the pandas-first course (was SQL). */}
      {false && q.example && (
        <section className="bg-slate-50 border border-slate-200 rounded p-4">
          <div className="text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1">Runnable example (in the editor →)</div>
          <p className="text-xs text-slate-600 mb-2">Try running this in the SQL editor to see real output. Schema: {SCHEMAS[exampleSchema] && SCHEMAS[exampleSchema].label}</p>
        </section>
      )}
    </div>
  );
}


function Header({ q, idx, total, solved, seconds }) {
  const isConcept = q.type === 'concept';
  const meta = isConcept ? null : SCHEMAS[q.sch];
  return (
    <header className="border-b border-slate-200 bg-white px-6 py-3 flex items-center justify-between flex-shrink-0">
      <div>
        <div className="flex items-center gap-2 text-xs text-slate-500 mb-0.5">
          {isConcept ? (
            <>
              <span className="text-purple-600 font-semibold">★ Lesson</span>
              <Icon name="chevronRight" className="w-3 h-3"/>
              <span>{CATEGORIES[q.cat].label}</span>
            </>
          ) : (
            <>
              <span>{meta.full_label}</span>
              <Icon name="chevronRight" className="w-3 h-3"/>
              <span>{CATEGORIES[q.cat].label}</span>
              <Icon name="chevronRight" className="w-3 h-3"/>
              <span className={`font-medium ${ACCENT_TEXT[meta.accent]}`}>Task {q.pos}</span>
            </>
          )}
        </div>
        <h1 className="font-bold text-slate-900 leading-tight">{q.t}</h1>
        <p className="text-xs text-slate-500">Task <span className="font-semibold text-slate-700">{idx+1} of {total}</span> · <span className="text-emerald-600 font-semibold">{solved} Solved</span></p>
      </div>
      <div className="flex items-center gap-3">
        <div className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 border border-slate-200 rounded-full text-sm font-mono font-semibold text-slate-700">
          <Icon name="clock" className="w-4 h-4 text-slate-500"/> {fmtTime(seconds)}
        </div>
        <div className="w-9 h-9 bg-indigo-500 rounded-full flex items-center justify-center text-white text-xs font-bold">JS</div>
      </div>
    </header>
  );
}

function ProblemPanel({ q, hintOpen, setHintOpen, showPandas, setShowPandas }) {
  const meta = SCHEMAS[q.sch];
  return (
    <div className="p-6 overflow-y-auto h-full">
      <div className="mb-4 flex items-center gap-2 flex-wrap">
        <span className={`inline-block text-xs font-bold tracking-wide px-2.5 py-1 rounded border ${DIFF[q.d].color}`}>{DIFF[q.d].label}</span>
        {false && q.cmds && q.cmds.map(c => (
          <span key={c} className="text-[10px] font-mono px-2 py-1 bg-slate-100 text-slate-600 rounded">{c}</span>
        ))}
      </div>
      <h2 className="text-2xl font-bold text-slate-900 mb-3">{q.n}. {q.t}</h2>
      <p className="text-slate-700 leading-relaxed mb-5">{q.prompt}</p>

      {q.protip && (
        <div className="flex gap-3 bg-emerald-50 border border-emerald-200 p-3 rounded-md mb-3">
          <Icon name="lightbulb" className="w-5 h-5 text-emerald-600 flex-shrink-0 mt-0.5"/>
          <div>
            <div className="text-xs font-bold text-emerald-700 uppercase tracking-wide mb-0.5">Pro Tip</div>
            <p className="text-xs text-emerald-900 leading-relaxed">{q.protip}</p>
          </div>
        </div>
      )}
      {q.rule && (
        <div className="flex gap-3 bg-red-50 border border-red-200 p-3 rounded-md mb-5">
          <Icon name="warn" className="w-5 h-5 text-red-600 flex-shrink-0 mt-0.5"/>
          <div>
            <div className="text-xs font-bold text-red-700 uppercase tracking-wide mb-0.5">Rule / Warning</div>
            <p className="text-xs text-red-900 leading-relaxed">{q.rule}</p>
          </div>
        </div>
      )}

      <button onClick={() => setHintOpen(!hintOpen)} className="flex items-center gap-1.5 text-purple-600 hover:text-purple-800 font-medium text-sm mb-4">
        <Icon name="bulb" className="w-4 h-4"/> Need a Hint?
      </button>
      {hintOpen && (
        <div className="bg-purple-50 border-l-4 border-purple-400 text-purple-900 text-sm p-3 rounded mb-5">{q.hint}</div>
      )}

      <div className="border-t border-slate-200 pt-4">
        <button onClick={() => setShowPandas(!showPandas)} className="flex items-center gap-1.5 text-slate-500 hover:text-slate-700 font-medium text-xs mb-2">
          <Icon name="snake" className="w-3.5 h-3.5"/> {showPandas ? 'Hide' : 'Show'} a worked solution <span className="text-slate-400">(try it yourself first)</span>
        </button>
        {showPandas && (
          <div className="bg-slate-900 text-slate-100 rounded-lg p-3 text-xs code whitespace-pre-wrap leading-relaxed">{q.pandas}</div>
        )}
      </div>
    </div>
  );
}

function SchemaPanel({ schema }) {
  const meta = SCHEMAS[schema];
  return (
    <div className="p-6 overflow-y-auto h-full">
      <div className="mb-4">
        <h2 className="text-2xl font-bold text-slate-900">{meta.full_label} Schema</h2>
        <p className="text-sm text-slate-500 italic mt-1">{meta.tagline}</p>
        <p className="text-sm text-slate-600 mt-2">{meta.description}</p>
      </div>
      <div className="space-y-3">
        {Object.entries(meta.tables).map(([t, info]) => (
          <details key={t} open className="bg-white border border-slate-200 rounded-lg overflow-hidden">
            <summary className={`px-4 py-3 cursor-pointer bg-slate-50 border-l-4 border-l-${meta.accent}-500 flex items-center justify-between`}>
              <div>
                <span className="font-mono font-semibold text-slate-800">{t}</span>
                <p className="text-xs text-slate-500 mt-0.5">{info.desc}</p>
              </div>
              <span className="text-xs text-slate-400 bg-slate-100 px-2 py-1 rounded">{info.cols.length} cols</span>
            </summary>
            <ul className="px-5 py-3 text-xs code text-slate-700 space-y-0.5 bg-white">
              {info.cols.map(c => <li key={c}>· {c}</li>)}
            </ul>
          </details>
        ))}
      </div>
    </div>
  );
}

function ResultTable({ result, dark = true, mask = null }) {
  if (!result || !result.columns) return <div className={dark ? "text-slate-500 italic" : "text-slate-400 italic"}>No rows.</div>;
  const cls = dark ? "r" : "r2";
  return (
    <div className="overflow-x-auto">
      <table className={cls}>
        <thead><tr>{result.columns.map((c, i) => <th key={i}>{c}</th>)}</tr></thead>
        <tbody>
          {result.values.map((row, i) => (
            <tr key={i}>
              {row.map((cell, j) => {
                const isDiff = mask && mask[i] && mask[i][j];
                return <td key={j} className={isDiff ? 'diff' : ''}>{cell === null ? <em className="opacity-60">NULL</em> : String(cell)}</td>;
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function QueryArea({ q, isConcept, activeSchema, code, setCode, onRun, onSubmit, onReset, onSkip, onBack, canBack, runResult, runError, submitState, expectedResult, attempt, onGrade, onAdvance, language, setLanguage, pyResult, pyError, pyBusy, pyImage, conceptResult }) {
  const isCorrect = submitState && submitState.correct;
  const showSideBySide = submitState && !isCorrect && attempt >= 2;
  const meta = SCHEMAS[activeSchema];

  return (
    <div className="flex flex-col gap-3 h-full w-full min-w-0">
      {/* EDITOR */}
      <div className="bg-white border border-slate-200 rounded-lg flex flex-col flex-shrink-0 shadow-sm">
        <div className="px-4 py-2 border-b border-slate-200 flex items-center justify-between bg-slate-50 rounded-t-lg">
          <div className="flex items-center gap-2">
            <div className="flex gap-1">
              <div className="w-2.5 h-2.5 rounded-full bg-red-400"/>
              <div className="w-2.5 h-2.5 rounded-full bg-yellow-400"/>
              <div className="w-2.5 h-2.5 rounded-full bg-green-400"/>
            </div>
            <h3 className="text-xs font-mono text-slate-500 ml-2">{language === 'python' ? 'python_repl' : 'query_editor — ' + meta.label.toLowerCase() + '.db'}</h3>
          </div>
          <div className="flex items-center gap-2">
            <span className="px-2 py-1 text-[10px] font-mono rounded bg-slate-900 text-white">pandas</span>
            <button onClick={onReset} className="flex items-center gap-1 text-xs text-slate-500 hover:text-slate-800">
              <Icon name="refresh" className="w-3.5 h-3.5"/> Reset
            </button>
          </div>
        </div>
        <textarea
          value={code}
          onChange={e => setCode(e.target.value)}
          spellCheck={false}
          placeholder={language === 'python' ? '# Write Python here. print(...) shows output.' : '-- Write your query here. Press Run Code to preview, Submit to grade.'}
          className="px-4 py-3 text-sm code text-slate-800 leading-relaxed bg-white min-h-[180px] rounded-b-lg"
        />
        <div className="px-3 py-2.5 border-t border-slate-200 flex items-center justify-end gap-2 flex-wrap bg-slate-50 rounded-b-lg">
          <button onClick={onBack} disabled={!canBack}
            className="flex items-center gap-1.5 px-3 py-2 text-sm border border-slate-300 rounded-lg text-slate-700 hover:bg-white disabled:opacity-40">
            <Icon name="skipBack" className="w-3.5 h-3.5"/> Back
          </button>
          <button onClick={onSkip}
            className="flex items-center gap-1.5 px-3 py-2 text-sm border border-slate-300 rounded-lg text-slate-700 hover:bg-white">
            <Icon name="skipFwd" className="w-3.5 h-3.5"/> Skip
          </button>
          <button onClick={onRun}
            className="flex items-center gap-1.5 px-3 py-2 text-sm border border-slate-300 rounded-lg text-slate-700 hover:bg-white">
            <Icon name="play" className="w-3.5 h-3.5"/> Run Code
          </button>
          <button onClick={onSubmit}
            className={`flex items-center gap-1.5 px-4 py-2 text-sm ${isConcept ? 'bg-purple-600 hover:bg-purple-700' : ACCENT_BTN[meta.accent]} text-white rounded-lg font-semibold shadow-sm`}>
            <Icon name={isConcept ? "check" : "send"} className="w-3.5 h-3.5"/> {isConcept ? "Check answer" : "Submit"}
          </button>
        </div>
      </div>

      {/* TERMINAL */}
      <div className="bg-slate-900 text-slate-100 rounded-lg flex flex-col flex-1 min-h-0 border border-slate-800 shadow-sm">
        <div className="px-4 py-2 border-b border-slate-800 flex items-center justify-between flex-shrink-0">
          <div className="flex items-center gap-2">
            <Icon name="chevronRight" className="w-4 h-4 text-slate-400"/>
            <h3 className="text-xs font-bold tracking-wide text-slate-400 uppercase">Output Terminal</h3>
          </div>
          {submitState && <span className={`text-[10px] font-mono uppercase font-bold ${isCorrect ? 'text-emerald-400' : 'text-red-400'}`}>{isCorrect ? '✓ correct' : `✗ attempt ${attempt}`}</span>}
        </div>
        <div className="flex-1 overflow-y-auto p-4 text-sm code">
          {pyBusy && language === 'python' && (
            <div className="text-slate-400 italic mb-2">Loading Python… (first run downloads ~10 MB, then it's cached)</div>
          )}
          {pyResult !== null && language === 'python' && (
            <>
              <div className="text-slate-400 text-xs mb-2">// stdout:</div>
              <pre className="text-emerald-300 whitespace-pre-wrap leading-relaxed">{pyResult}</pre>
            </>
          )}
          {pyImage && language === 'python' && (
            <>
              <div className="text-slate-400 text-xs mb-2 mt-2">// chart:</div>
              <img src={pyImage} alt="chart output" className="max-w-full rounded bg-white p-1"/>
            </>
          )}
          {pyError !== null && language === 'python' && (
            <>
              <div className="text-red-400 text-xs mb-2">// error:</div>
              <pre className="text-red-300 whitespace-pre-wrap leading-relaxed">{pyError}</pre>
            </>
          )}
          {isConcept && conceptResult && (
            <div className={`mt-3 p-3 rounded border ${conceptResult.pass ? 'bg-emerald-900/40 border-emerald-600 text-emerald-200' : 'bg-red-900/30 border-red-700 text-red-200'}`}>
              {conceptResult.pass ? (
                <>
                  <div className="font-bold mb-2">✓ Nice — that works.</div>
                  <button onClick={onAdvance} className="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 rounded text-xs font-semibold flex items-center gap-1 text-white"><Icon name="chevronRight" className="w-3 h-3"/> Next lesson</button>
                </>
              ) : (
                <div className="text-sm">✗ {conceptResult.why}</div>
              )}
            </div>
          )}
          {!runResult && !runError && !submitState && pyResult === null && pyError === null && pyImage === null && !pyBusy && (
            <div className="h-full flex items-center justify-center"><span className="text-slate-500 italic">No results yet. Press Run Code{language === 'sql' ? ' or Submit' : ''}.</span></div>
          )}
          {runResult && !submitState && (
            <>
              <div className="text-slate-400 text-xs mb-2">// {runResult.values.length} row{runResult.values.length!==1?'s':''} returned</div>
              <ResultTable result={runResult}/>
            </>
          )}
          {runError && !submitState && <div className="text-red-400 whitespace-pre-wrap">{runError}</div>}
          {isCorrect && (
            <>
              <div className="text-emerald-300 mb-3 font-bold">✓ Got it. Result matches the reference.</div>
              <div className="text-slate-400 text-xs mb-2">// Your output ({submitState.userResult.values.length} rows):</div>
              <ResultTable result={submitState.userResult}/>
              <div className="mt-4 pt-3 border-t border-slate-700">
                <div className="text-slate-400 text-xs mb-1">// Why this works:</div>
                <p className="text-slate-200 text-xs leading-relaxed">{q.explanation}</p>
              </div>
              <div className="mt-3"><button onClick={() => onGrade('right')} className="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 rounded text-xs font-semibold flex items-center gap-1"><Icon name="check" className="w-3 h-3"/> Mark solved + next</button></div>
            </>
          )}
          {submitState && !isCorrect && attempt < 2 && (
            <>
              <div className="text-red-400 mb-3 font-bold">✗ Doesn't match yet. Try again.</div>
              <div className="text-slate-400 text-xs mb-2">// Your output ({submitState.userResult ? submitState.userResult.values.length : 0} rows):</div>
              {submitState.userResult ? <ResultTable result={submitState.userResult}/> : <div className="text-red-400">{submitState.error}</div>}
              <div className="mt-3 text-xs text-slate-400 italic">One more wrong attempt and I'll show your output side-by-side with the expected output.</div>
            </>
          )}
          {showSideBySide && (
            <>
              <div className="text-red-400 mb-3 font-bold">✗ Still off. Compare carefully:</div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <div className="text-slate-400 text-xs mb-1">// YOUR output:</div>
                  {submitState.userResult ? <ResultTable result={submitState.userResult} mask={diffMask(submitState.userResult, expectedResult)}/> : <div className="text-red-400">{submitState.error}</div>}
                </div>
                <div>
                  <div className="text-emerald-300 text-xs mb-1">// EXPECTED output:</div>
                  <ResultTable result={expectedResult} mask={diffMask(expectedResult, submitState.userResult)}/>
                </div>
              </div>
              <div className="mt-4 pt-3 border-t border-slate-700"><div className="text-slate-400 text-xs mb-1">// Reference SQL:</div><pre className="whitespace-pre-wrap text-emerald-300 text-xs">{q.sql}</pre></div>
              <div className="mt-4 pt-3 border-t border-slate-700"><div className="text-slate-400 text-xs mb-1">// Why:</div><p className="text-slate-200 text-xs leading-relaxed">{q.explanation}</p></div>
              <div className="mt-3 flex gap-2">
                <button onClick={() => onGrade('partial')} className="px-3 py-1.5 bg-yellow-600 hover:bg-yellow-700 rounded text-xs font-semibold">Got the idea, move on</button>
                <button onClick={() => onGrade('wrong')} className="px-3 py-1.5 bg-red-600 hover:bg-red-700 rounded text-xs font-semibold flex items-center gap-1"><Icon name="x" className="w-3 h-3"/> Skip & flag weak</button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}
