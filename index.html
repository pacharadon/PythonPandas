    why_pandas: 'pandas IS Python. To read pandas you must read Python first. There is no shortcut.',
    what: 'Python is a way to talk to your computer using English-like sentences. You write a line, the computer reads it and does what you said. The book that follows is just learning the words.',
    glossary: [
      { term: 'language', defn: 'a system of words and rules — Python is one' },
      { term: 'interpreter', defn: 'the program that reads your Python and runs it' },
      { term: 'script', defn: 'a file containing Python lines' },
    ],
    gotchas: [
      'Python is case-sensitive: Print and print are different.',
      'You do not need to know HOW Python runs — only HOW to write it.',
    ],
    try_yourself: {
      prompt: 'Without running anything, predict what would happen if you typed: print("hello")',
      starter_py: "print(\"hello\")  # Your first Python line. Click Run."
    },
    try_hints: [
      'print() shows the value inside.',
      'It would display: hello',
      'Python reads "hello" as text and prints it. Output: hello',
    ],
    example: { schema: 'shopee', sql: '-- Python is what you talk to. SQL is what we are running here today.\nSELECT \'hello from SQL\' AS first_line;' }
  },

  py_00b_run: {
    t: 'How does code run? Top to bottom.',
    topic: 'zero',
    pandas_progress: 2,
    why_pandas: 'Pandas notebooks run cell by cell, top to bottom. If line 5 needs something from line 3, line 3 must be there first. Order matters.',
    what: 'Python reads your file one line at a time, top to bottom. If line 1 says x = 5, line 2 can use x. Line 1 cannot use something defined on line 5 — it has not happened yet.',
    glossary: [
      { term: 'execution', defn: 'Python actually doing what your line says' },
      { term: 'line by line', defn: 'one statement runs, then the next' },
    ],
    gotchas: [
      'You cannot use a variable before defining it. NameError tells you "name is not defined."',
      'The same line of code can succeed or fail depending on what came before it.',
    ],
    try_yourself: {
      prompt: 'Predict what happens. Does line 1 work? Line 2?',
      starter_py: 'print(x)\nx = 5', expect: { error: true }
    },
    try_hints: [
      'Line 1 tries to use x — but x has not been defined yet.',
      'Line 1 errors with NameError. Line 2 never runs because Python stops.',
      'Output: NameError: name \'x\' is not defined. Swap the lines and it works.',
    ],
    example: { schema: 'shopee', sql: '-- SQL also reads top-down: WITH... SELECT works because WITH ran first.\nWITH cheap AS (SELECT * FROM orders_regional WHERE order_amount < 100)\nSELECT COUNT(*) FROM cheap;' }
  },

  py_00c_print: {
    t: 'print() — your eyes into the program',
    topic: 'zero',
    pandas_progress: 4,
    why_pandas: 'When pandas does something weird, your first move is print(df.head()) or print(df.dtypes). print() is debug move #1.',
    what: 'print(x) shows you what x contains. The parentheses are required. Without print, you have no idea what is happening inside your code.',
    glossary: [
      { term: 'print(x)', defn: 'show the value of x' },
      { term: 'parentheses', defn: 'the round brackets ( and ) — required around the value' },
      { term: 'argument', defn: 'the value you put inside the parentheses' },
    ],
    gotchas: [
      'print x without parentheses errors. It is print(x), always.',
      'You can print multiple things: print("count:", 5) shows "count: 5".',
    ],
    try_yourself: {
      prompt: 'Print your name. Then print your age. Two separate lines.',
      starter_py: "print(\"Danny\")\nprint(30)"
    },
    try_hints: [
      'print( something )',
      'print("Danny")\nprint(30)',
      'Output: Danny then 30 on the next line.',
    ],
    example: { schema: 'shopee', sql: '-- SQL does not have print — every SELECT is the print.\nSELECT \'Danny\' AS name, 30 AS age;' }
  },

  py_00d_comments: {
    t: '# means: ignore me, Python',
    topic: 'zero',
    pandas_progress: 5,
    why_pandas: 'Real pandas scripts are 50% comments. You need to read them — and write them — to follow what your future self meant.',
    what: 'A line starting with # is a comment. Python ignores it. You use comments to explain WHY your code does something. The code says what; the comment says why.',
    glossary: [
      { term: '#', defn: 'starts a comment' },
      { term: 'inline comment', defn: 'a comment after code on the same line' },
    ],
    gotchas: [
      'Comments do not run. If your bug is in a comment, Python does not care.',
      'Avoid restating the obvious: # add 1 to x is useless above x = x + 1.',
    ],
    try_yourself: {
      prompt: 'Add a comment above this line explaining what it does:  total = price * quantity',
      starter_py: 'price = 20\nquantity = 3\n# (your comment here)\ntotal = price * quantity\nprint(total)'
    },
    try_hints: [
      'Explain the WHY, not the what.',
      '# total revenue per line item — used by the invoice export below',
      'A good comment helps the next reader; a bad one repeats the code.',
    ],
    example: { schema: 'shopee', sql: '-- SQL uses -- for line comments. Same idea.\n-- Pull active TH users\nSELECT * FROM shopee_users WHERE country = \'TH\' AND acct_status = \'ACTIVE\' LIMIT 5;' }
  },

  py_00e_naming: {
    t: 'Naming variables — the 3 rules',
    topic: 'zero',
    pandas_progress: 6,
    why_pandas: 'pandas column names follow the same rules. df["1col"] errors. df["my_col"] works. Pick names that pandas accepts.',
    what: 'Variable names must: (1) start with a letter or underscore, NOT a digit. (2) contain only letters, digits, and underscores — no spaces, no dashes. (3) not be a Python reserved word like for, if, class.',
    glossary: [
      { term: 'identifier', defn: 'fancy name for a variable name' },
      { term: 'snake_case', defn: 'lowercase words separated by underscores — Python convention' },
      { term: 'reserved word', defn: 'words Python uses for itself: for, if, while, def, class…' },
    ],
    gotchas: [
      '1st_place errors (starts with a digit). first_place works.',
      'order amount errors (contains a space). order_amount works.',
      'class = 5 errors (class is reserved). cls or class_name works.',
    ],
    try_yourself: {
      prompt: 'Which of these are valid variable names? user_id, 2nd_user, total amount, total-amount, _private, class',
      starter_py: "user_id = 101\n_private = \"ok\"\nprint(user_id, _private)\n# Uncomment to see errors:\n# 2nd_user = 1     # SyntaxError: starts with digit\n# total amount = 1  # SyntaxError: contains space"
    },
    try_hints: [
      'Check rules: starts with letter or _, no spaces, no dashes, not reserved.',
      'Valid: user_id, _private. Invalid: 2nd_user (digit start), total amount (space), total-amount (dash), class (reserved).',
      '_private is valid — leading underscore is allowed and means "intended as private."',
    ],
    example: { schema: 'shopee', sql: '-- SQL columns also need quoting if they have spaces:\nSELECT user_id, "weird name" FROM shopee_users LIMIT 1;' }
  },

  py_00f_indent: {
    t: 'Indentation — Python uses spaces to group code',
    topic: 'zero',
    pandas_progress: 7,
    why_pandas: 'Functions you pass to .apply() must indent right. Mess this up and pandas errors with IndentationError.',
    what: 'Most languages use { } to group code. Python uses indentation — usually 4 spaces. Code with the same indent runs as one block. Mix tabs and spaces and Python freaks out.',
    glossary: [
      { term: 'indentation', defn: 'the leading spaces on a line' },
      { term: 'block', defn: 'a group of lines with the same indent' },
      { term: 'PEP 8', defn: 'Python style guide — says use 4 spaces, never tabs' },
    ],
    gotchas: [
      'IndentationError means your spaces do not match. Always use 4 spaces, never tabs.',
      'Code editors auto-indent for you — trust them.',
      'A function body MUST be indented. def f(): return 1 on one line is a hack but unindented bodies error.',
    ],
    try_yourself: {
      prompt: 'Why does this error? Fix it.',
      starter_py: 'def add(a, b):\nreturn a + b'
    },
    try_hints: [
      'The body of the function must be indented.',
      'def add(a, b):\n    return a + b   ← 4 spaces before return',
      'Without indent, Python thinks return is outside the function and errors.',
    ],
    example: { schema: 'shopee', sql: '-- SQL does not care about indentation but readable code does:\nSELECT u.country,\n       COUNT(*) AS cnt\n  FROM shopee_users u\n GROUP BY u.country;' }
  },

  py_00g_errors: {
    t: 'Errors are not fatal — read the LAST line first',
    topic: 'zero',
    pandas_progress: 9,
    why_pandas: 'pandas errors are notoriously long. Same trick: jump to the bottom. The last line tells you what went wrong; everything above is just where it happened.',
    what: 'When Python errors, it prints a "traceback" — a stack of where the error happened. Beginners read top-down and panic. Experts read the LAST line first: it names the error and what triggered it.',
    glossary: [
      { term: 'traceback', defn: 'the multi-line error message' },
      { term: 'NameError', defn: 'used a variable that was never defined' },
      { term: 'TypeError', defn: 'wrong type — like adding a number and a string' },
      { term: 'ValueError', defn: 'right type, wrong value — like int("abc")' },
    ],
    gotchas: [
      'Errors are good news — they tell you exactly where the bug is.',
      'Last line = WHAT. Lines above = WHERE.',
      'If you see "during handling of the above exception, another exception occurred…" the second one is the real one.',
    ],
    try_yourself: {
      prompt: 'What error do you predict? Read your prediction before running.',
      starter_py: 'price = "100"\ntotal = price + 50', expect: { error: true }
    },
    try_hints: [
      '"100" is a string. 50 is a number. Adding them...',
      'TypeError: can only concatenate str (not "int") to str',
      'Fix: total = int(price) + 50.',
    ],
    example: { schema: 'shopee', sql: '-- SQL errors are usually one line and tell you exactly what column is missing.\n-- Try: SELECT does_not_exist FROM shopee_users;\nSELECT user_id FROM shopee_users LIMIT 1;' }
  },


  py_01_types: {
    t: 'Variables and the 4 types',
    topic: 'types',
    pandas_progress: 12,
    why_pandas: 'Every column in a pandas DataFrame has ONE type. Wrong type breaks everything (sums become string concatenation, dates become text). You need to recognize types first.',
    what: 'A variable is a name you give a value. Python has 4 main types you will live and die by: int (whole number), float (decimal), str (text), bool (True/False). The "type" tells Python what it can do with the value.',
    glossary: [
      { term: 'variable', defn: 'a name pointing to a value, like name = "Danny"' },
      { term: 'int', defn: 'whole number — 30, 100, -5' },
      { term: 'float', defn: 'decimal — 19.99, 3.14' },
      { term: 'str', defn: 'text in quotes — "hello"' },
      { term: 'bool', defn: 'True or False (always capitalized)' },
    ],
    gotchas: [
      'True and False MUST be capitalized. true and false will error.',
      '"30" and 30 are different — quotes make it text, not a number.',
    ],
    try_yourself: {
      prompt: 'For each variable below, predict the type before running. Then run type(x), type(y), type(z), type(active) one at a time and check.',
      starter_py: 'x = 10\ny = 10.5\nz = "10"\nactive = False'
    },
    try_hints: [
      'No quotes = number. Quotes = text. Decimal = float.',
      'x is int, y is float, z is str (because of quotes), active is bool.',
      'Run: type(x) returns <class \'int\'>; type(y) returns <class \'float\'>; type(z) returns <class \'str\'>; type(active) returns <class \'bool\'>.',
    ],
    example: { schema: 'shopee', sql: '-- Python (run mentally — this editor runs SQL):\n-- x = 10           ints work in pandas as int64\n-- y = 10.5         floats become float64\n-- z = "10"         strings become object dtype\n-- active = False   bools become bool\n\nSELECT 1 AS try_running_an_sql_query;' }
  },

  py_02_quotes: {
    t: 'Quotes vs no quotes — "10" is NOT 10',
    topic: 'types',
    pandas_progress: 18,
    why_pandas: 'CSV files often store numbers as text. When pandas reads them, the column becomes "object" (string) and sum/mean break. You must spot this and fix it.',
    what: 'Quotes around something turn it into a string. No quotes (just digits or True/False) keep it as a real number or bool. Python is strict about this — it will not guess.',
    glossary: [
      { term: 'string', defn: 'text in double or single quotes' },
      { term: 'number', defn: 'digits without quotes' },
      { term: 'object dtype', defn: 'pandas word for "this column is text"' },
    ],
    gotchas: [
      'sum(["100", "200"]) errors — Python cannot add strings as numbers.',
      'In pandas, df["sales"].sum() returns "100200" if the column is text — silent disaster.',
    ],
    try_yourself: {
      prompt: 'Predict what happens with each line. Which one errors?',
      starter_py: 'a = 100 + 200\nb = "100" + "200"\nc = "100" + 200', expect: { error: true }
    },
    try_hints: [
      'Adding two strings glues them together.',
      'a is a number (300). b is a string ("100200"). c errors — cannot mix.',
      'Result: a = 300 (int). b = "100200" (str — concatenation). c throws TypeError.',
    ],
    example: { schema: 'shopee', sql: '-- In SQL too: \'100\' + \'200\' is database-specific.\n-- In SQLite, this returns 300 (auto-converts). In strict DBs, error.\nSELECT \'100\' + \'200\' AS sqlite_does_what;' }
  },

  py_03_convert: {
    t: 'Type conversion — fixing dirty data',
    topic: 'types',
    pandas_progress: 22,
    why_pandas: 'You will spend hours converting types. int(), float(), str() are the three you need. In pandas this becomes df["col"].astype(int).',
    what: 'int("10") turns text "10" into the number 10. float("3.14") turns text into a decimal. str(10) turns a number into text. These are called type cast functions.',
    glossary: [
      { term: 'cast', defn: 'convert from one type to another' },
      { term: 'int(x)', defn: 'convert x to a whole number' },
      { term: 'float(x)', defn: 'convert x to a decimal' },
      { term: 'str(x)', defn: 'convert x to text' },
    ],
    gotchas: [
      'int("3.5") errors — int() does not handle decimals in strings. Use int(float("3.5")) instead.',
      'int("abc") errors — cannot convert non-numeric text.',
      'float("") errors — empty string. You must clean missing values first.',
    ],
    try_yourself: {
      prompt: 'Convert "200" to a number, then add 50 to it. Print the result.',
      starter_py: 'sale = "200"\n# your code here'
    },
    try_hints: [
      'int() turns text into a number.',
      'Wrap int() around the variable, then add 50.',
      'int(sale) + 50 returns 250.',
    ],
    example: { schema: 'shopee', sql: '-- SQL equivalent of int("200"): CAST(\'200\' AS INTEGER)\nSELECT CAST(\'200\' AS INTEGER) + 50 AS converted_then_added;' }
  },

  py_04_lists: {
    t: 'Lists — your first collection',
    topic: 'lists',
    pandas_progress: 28,
    why_pandas: 'A pandas column behaves almost exactly like a Python list. If you understand lists, you understand 70% of pandas Series.',
    what: 'A list is an ordered collection of values inside square brackets [ ]. Items are separated by commas. A list can hold numbers, strings, anything — even mixed types.',
    glossary: [
      { term: 'list', defn: 'ordered collection in [ ] brackets' },
      { term: 'element', defn: 'one item inside a list' },
      { term: 'len(list)', defn: 'how many items the list has' },
    ],
    gotchas: [
      'Empty list is [], not {} (that is a dict) or () (that is a tuple).',
      'A list can hold different types: [1, "two", 3.0] is valid.',
    ],
    try_yourself: {
      prompt: 'Create a list called sales with 4 numbers, then print its length.',
      starter_py: "sales = [100, 200, 300, 400]\nprint(len(sales))\nprint(sales)"
    },
    try_hints: [
      'Use square brackets and commas.',
      'sales = [100, 200, 300, 400]; print(len(sales))',
      'Output: 4 (because there are 4 elements).',
    ],
    example: { schema: 'shopee', sql: '-- Conceptually: a SQL column IS a list.\nSELECT order_id FROM orders_regional LIMIT 4;' }
  },

  py_05_index: {
    t: 'List indexing — zero-based!',
    topic: 'lists',
    pandas_progress: 33,
    why_pandas: 'pandas .iloc[0] picks the first row. Python uses zero-based indexing — counting starts at 0, not 1. This trips up everyone.',
    what: 'sales[0] gives you the FIRST item. sales[1] is the second. sales[-1] gives the LAST item (negative indexing counts from the end).',
    glossary: [
      { term: 'index', defn: 'the position number of an item' },
      { term: 'zero-based', defn: 'first item is at index 0, not 1' },
      { term: 'sales[-1]', defn: 'shortcut for the last element' },
    ],
    gotchas: [
      'sales[len(sales)] errors — index out of range. Use sales[len(sales) - 1] or sales[-1].',
      'sales[0] is the FIRST. Coming from Excel? Mentally subtract 1.',
    ],
    try_yourself: {
      prompt: 'Given sales = [100, 200, 300, 400], what does sales[2] return? What does sales[-1] return?',
      starter_py: 'sales = [100, 200, 300, 400]\n# print sales[2]\n# print sales[-1]'
    },
    try_hints: [
      'Count from 0: sales[0]=100, sales[1]=200, sales[2]=?',
      'sales[2] is 300 (third item). sales[-1] is the last = 400.',
      'Output: 300 then 400.',
    ],
    example: { schema: 'shopee', sql: '-- SQL has no zero-index — uses LIMIT/OFFSET instead.\n-- This grabs the 3rd order (offset 2 = skip 2):\nSELECT order_id FROM orders_regional LIMIT 1 OFFSET 2;' }
  },

  py_06_slice: {
    t: 'List slicing — taking a chunk',
    topic: 'lists',
    pandas_progress: 38,
    why_pandas: 'pandas df.iloc[1:3] uses the same slicing syntax. Master Python slicing and DataFrame row-range selection is free.',
    what: 'sales[1:3] gives you items at index 1 and 2 (NOT 3 — the end is exclusive). sales[:2] is from start to index 2. sales[2:] is from index 2 to end.',
    glossary: [
      { term: 'slice', defn: 'a sublist taken with [start:end]' },
      { term: 'inclusive', defn: 'start IS included' },
      { term: 'exclusive', defn: 'end is NOT included' },
    ],
    gotchas: [
      'sales[1:3] gives 2 items, not 3. End is exclusive — confusing but consistent.',
      'sales[:] copies the entire list. Useful trick.',
    ],
    try_yourself: {
      prompt: 'Given sales = [10, 20, 30, 40, 50], what does sales[1:4] return?',
      starter_py: 'sales = [10, 20, 30, 40, 50]\n# print sales[1:4]'
    },
    try_hints: [
      'Start at index 1, stop before index 4.',
      'sales[1:4] = [20, 30, 40] — three items.',
      'Output: [20, 30, 40]',
    ],
    example: { schema: 'shopee', sql: '-- Equivalent in SQL: rows 2 through 4 (1-based, inclusive):\nSELECT order_id FROM orders_regional LIMIT 3 OFFSET 1;' }
  },

  py_07_dicts: {
    t: 'Dictionaries — labels for values',
    topic: 'dicts',
    pandas_progress: 44,
    why_pandas: 'A pandas row is essentially a dictionary: column names point to values. df["price"] uses the same key-lookup pattern as dict["price"].',
    what: 'A dictionary stores key-value pairs in curly braces { }. Each key is a name, each value is what that name points to. Access with dict["key"].',
    glossary: [
      { term: 'dict', defn: 'collection of key-value pairs' },
      { term: 'key', defn: 'the label (must be unique)' },
      { term: 'value', defn: 'what the key points to' },
      { term: '.get(key)', defn: 'safer lookup — returns None if missing' },
    ],
    gotchas: [
      'dict["missing_key"] errors. Use dict.get("missing_key") to get None instead.',
      'Keys are usually strings, but can be numbers too. Values can be anything.',

    try_yourself: {
      prompt: 'Create a dict for one Shopee user with id 101, country "TH", active True. Then print just the country.',
      starter_py: 'user = { ... }\n# print user["country"]'
    },
    try_hints: [
      'Use curly braces, key:value separated by commas.',
      'user = {"id": 101, "country": "TH", "active": True}',
      'print(user["country"]) returns "TH".',
    ],
    example: { schema: 'shopee', sql: '-- SQL row IS a dict:\nSELECT user_id, country, acct_status FROM shopee_users LIMIT 1;' }
  },

  py_08_loops: {
    t: 'Loops — for x in items',
    topic: 'loops',
    pandas_progress: 50,
    why_pandas: 'Pandas hides loops behind .apply() and column operations, but you must understand the underlying for loop first or .apply() is magic.',
    what: 'A "for" loop does ONE thing: it runs the same lines once for every item in a list.\n\nThe shape is:  for p in prices:  followed by an indented body. Read it as plain English: "FOR EACH p IN prices, run the indented lines."\n\nStep by step, for prices = [100, 200, 300]:\n• Round 1 → p = 100, the body runs with p as 100\n• Round 2 → p = 200, the body runs again\n• Round 3 → p = 300, the body runs once more\n• the list is finished → the loop stops\n\nThe name "p" is yours to pick: "for price in prices" and "for x in prices" do exactly the same thing. It is just a fresh label holding the current item on each round.',
    examples: [
      { note: '1. The basic shape — print every item:', code: 'prices = [100, 200, 300]\nfor p in prices:\n    print(p)\n# 100\n# 200\n# 300' },
      { note: '2. Do real work in the body — keep a running total:', code: 'prices = [100, 200, 300]\ntotal = 0\nfor p in prices:\n    total = total + p     # this line runs 3 times\nprint(total)              # 600' },
      { note: '3. You can loop over any list, even words:', code: 'countries = ["TH", "ID", "VN"]\nfor c in countries:\n    print("Active in", c)\n# Active in TH\n# Active in ID\n# Active in VN' },
    ],
    glossary: [
      { term: 'for', defn: 'starts the loop' },
      { term: 'in', defn: 'links your loop variable to the list you want to walk' },
      { term: 'loop variable', defn: 'the p in "for p in" — holds the current item each round; you choose the name' },
      { term: 'loop body', defn: 'the indented line(s) that run once per item' },
      { term: 'iteration', defn: 'one round of the loop (one item)' },
    ],
    gotchas: [
      'The colon at the end of "for p in prices:" is required.',
      'The body MUST be indented (4 spaces). No indent → IndentationError.',
      'The loop variable is just a name you choose — for p / for x / for price all behave the same.',
      'The body runs once per item: a 3-item list runs it 3 times.',
    ],
    try_yourself: {
      prompt: 'Two parts: (1) loop over prices and print each price. (2) Then add 10% — print each price * 1.1 (so 100 becomes 110.0).',
      starter_py: 'prices = [100, 200, 300]\n\n# Part 1 — print each price:\n# for ... in ...:\n#     print(...)\n\n# Part 2 — print each price plus 10% (price * 1.1):'
    },
    try_hints: [
      'Part 1 pattern: for VAR in LIST: print(VAR)',
      'for p in prices:\n    print(p)\n# Part 2 body: print(p * 1.1)',
      'Part 1 prints 100, 200, 300. Part 2 prints 110.0, 220.0, 330.0 (each on its own line).',
    ],
    example: { schema: 'shopee', sql: '-- SQL "loops" automatically over rows.\nSELECT order_amount FROM orders_regional LIMIT 5;' }
  },

  py_09_loopvar: {
    t: 'The loop variable is just a nickname',
    topic: 'loops',
    pandas_progress: 55,
    why_pandas: 'When you read pandas tutorials and see "for col in df.columns" or "for idx, row in df.iterrows()", knowing that col, idx, row are just names you chose makes everything click.',
    what: 'In "for x in sales", the x is just a label YOU named — it is not a keyword. "for banana in sales" works identically; the name simply holds each item in turn.\n\nSo why care? A clear name makes the body read like English:\n• for x in users: ...      ← x could be anything\n• for user in users: ...   ← obviously a user',
    examples: [
      { note: 'Same loop, three different names — all behave identically:', code: 'sales = [10, 20]\nfor x in sales: print(x)\nfor s in sales: print(s)\nfor banana in sales: print(banana)\n# each version prints 10 then 20' },
      { note: 'A descriptive name makes the body obvious:', code: 'users = ["alice", "bob"]\nfor user in users:\n    print(user, "is active")\n# alice is active\n# bob is active' },
    ],
    glossary: [
      { term: 'naming convention', defn: 'choosing descriptive names like price, user, row' },
      { term: 'temporary scope', defn: 'the loop variable only exists during the loop' },
    ],
    gotchas: [
      'Reusing a loop variable name as a real variable later gets confusing. Pick distinct names.',
      'Single-letter names (i, x, n) are OK for short loops. Longer = use real words.',
    ],
    try_yourself: {
      prompt: 'Rewrite this loop with a better variable name than x: for x in [10, 20, 30]: print(x)',
      starter_py: 'numbers = [10, 20, 30]\n# write a loop with a meaningful variable name'
    },
    try_hints: [
      'What is the item? A number. So name the variable... number.',
      'for number in numbers:\n    print(number)',
      'Same output as for x in numbers — just clearer for the reader.',
    ],
    example: { schema: 'shopee', sql: '-- Aliases in SQL play a similar role:\nSELECT u.country AS shopper_country FROM shopee_users u LIMIT 5;' }
  },

  py_10_compare: {
    t: 'Equals vs double equals — = is store, == is ask',
    topic: 'compare',
    pandas_progress: 62,
    why_pandas: 'pandas filtering uses ==. df[df["country"] == "TH"] is the most common pandas pattern in the world. Get this wrong and your filter returns nothing.',
    what: 'Single = STORES a value: age = 30 means "put 30 into age".\nDouble == ASKS a question: age == 30 means "is age equal to 30?" — and the answer is True or False.\n\nThat True/False is the whole point: it is what powers filters and if-statements.',
    examples: [
      { note: '= stores, == asks:', code: 'age = 30          # store 30 in age\nprint(age == 30)  # ask: is it 30? -> True\nprint(age == 25)  # -> False' },
      { note: 'The comparison family (case and type matter):', code: 'print(10 > 5)        # True\nprint(10 != 5)       # not-equal -> True\nprint("TH" == "th")  # case matters -> False' },
      { note: 'This is exactly how a pandas filter decides each row:', code: 'prices = [80, 120, 50]\nfor p in prices:\n    print(p, p > 100)\n# 80 False / 120 True / 50 False' },
    ],
    glossary: [
      { term: 'assignment', defn: '= stores a value into a variable' },
      { term: 'comparison', defn: '== checks if two things are equal' },
      { term: '!=', defn: 'not equal to' },
      { term: '<, >, <=, >=', defn: 'less, greater, less-or-equal, greater-or-equal' },
    ],
    gotchas: [
      'Using = inside an if statement (if x = 5:) is a syntax error in Python. Use == instead.',
      '== compares VALUES. is checks identity (same object in memory). Use == 99% of the time.',
    ],
    try_yourself: {
      prompt: 'Predict True or False for each: 5 == 5, 5 == "5", 10 != 9',
      starter_py: "print(5 == 5)\nprint(5 == \"5\")\nprint(10 != 9)"
    },
    try_hints: [
      '5 and "5" are different types.',
      'True, False (different types never equal in Python), True',
      'Output: True, False, True',
    ],
    example: { schema: 'shopee', sql: 'SELECT * FROM shopee_users WHERE country = \'TH\' LIMIT 5;' }
  },

  py_11_bool: {
    t: 'Booleans — True and False (capitalized!)',
    topic: 'compare',
    pandas_progress: 68,
    why_pandas: 'pandas filters return a Boolean Series. Knowing True/False is non-negotiable — every filter, every conditional column, every .isnull() returns booleans.',
    what: 'True and False are the only two boolean values, and they MUST be capitalized (lowercase true / false error).\n\nYou combine them with WORDS, not symbols:\n• and → True only if BOTH sides are True\n• or  → True if AT LEAST ONE side is True\n• not → flips True to False and back',
    examples: [
      { note: 'and / or / not:', code: 'print(True and False)  # both true? no  -> False\nprint(True or False)   # either true? yes -> True\nprint(not True)        # flip -> False' },
      { note: 'Comparisons make booleans you can combine:', code: 'age = 20\nprint(age > 18 and age < 65)  # True\nprint(age < 13 or age > 65)   # False' },
      { note: 'Empty / zero values are "falsy" in an if:', code: 'cart = []\nif cart:\n    print("has items")\nelse:\n    print("empty")   # [] is falsy -> empty' },
    ],
    glossary: [
      { term: 'boolean', defn: 'a value that is either True or False' },
      { term: 'truthy', defn: 'values that act like True (non-empty, non-zero)' },
      { term: 'falsy', defn: 'values that act like False (0, "", [], None)' },
    ],
    gotchas: [
      'true (lowercase) gives NameError. Always capitalize.',
      '0, "", [], None are all "falsy" — they act like False in if statements.',
      'Mixing logical operators: use "and"/"or"/"not", NOT &&/||/!.',
    ],
    try_yourself: {
      prompt: 'Predict the result of: True and False, True or False, not True',
      starter_py: "print(True and False)\nprint(True or False)\nprint(not True)"
    },
    try_hints: [
      '"and" needs both True. "or" needs at least one True. "not" flips.',
      'False, True, False',
      'Output: False, True, False',
    ],
    example: { schema: 'shopee', sql: '-- SQL uses 1/0 or TRUE/FALSE depending on the dialect.\nSELECT user_id, (acct_status = \'ACTIVE\') AS is_active FROM shopee_users LIMIT 5;' }
  },

  py_12_funcs: {
    t: 'Functions — reusable bundles',
    topic: 'funcs',
    pandas_progress: 75,
    why_pandas: 'df["price"].apply(my_function) takes a function and runs it on every row. You write the function once, pandas applies it to thousands of rows.',
    what: 'A function is a named, reusable block of code. You DEFINE it once, then CALL it as many times as you like.\n\n  def double(x):     # def NAME(parameter):\n      return x * 2   # return hands a value back\n\n  double(5)          # call it: 5 goes in as x, 10 comes back\n\nKey idea: return gives a value back so you can store and use it. A function with no return hands back None. (print only shows something on screen — it does not return it.)',
    examples: [
      { note: 'Define once, call many times:', code: 'def double(x):\n    return x * 2\n\nprint(double(5))   # 10\nprint(double(50))  # 100' },
      { note: 'return lets you capture the answer:', code: 'def add(a, b):\n    return a + b\n\ntotal = add(2, 3)   # total is 5 — keep using it\nprint(total * 10)   # 50' },
      { note: 'No return = you get None back:', code: 'def show(x):\n    print(x)        # shows it...\n\nresult = show(7)    # prints 7\nprint(result)       # None (nothing was returned)' },
    ],
    glossary: [
      { term: 'def', defn: 'keyword to define a function' },
      { term: 'parameter', defn: 'input variable in the function definition' },
      { term: 'argument', defn: 'actual value passed when calling' },
      { term: 'return', defn: 'sends a value back to the caller' },
    ],
    gotchas: [
      'Forgetting return means the function gives back None.',
      'Function body must be indented.',
      'Functions can have default values: def f(x=10): — caller can skip x.',
    ],
    try_yourself: {
      prompt: 'Write a function called double that takes a number and returns it doubled. Then call it with 5.',
      starter_py: "def double(x):\n    return x * 2\n\nprint(double(5))\nprint(double(11))"
    },
    try_hints: [
      'Pattern: def NAME(PARAM): return EXPRESSION',
      'def double(x):\n    return x * 2\nprint(double(5))',
      'Output: 10',
    ],
    example: { schema: 'shopee', sql: '-- SQL has built-in functions like ROUND, ABS, COALESCE — same idea.\nSELECT ROUND(order_amount, 0) AS rounded FROM orders_regional LIMIT 5;' }
  },

  py_13_comp: {
    t: 'List comprehensions — the pandas mindset',
    topic: 'comp',
    pandas_progress: 82,
    why_pandas: 'List comprehensions ARE the pandas mindset: transform every item in a collection. df["price"] * 1.1 in pandas is [p * 1.1 for p in prices] in Python. Same idea.',
    what: 'A list comprehension is a one-line for loop that BUILDS a new list.\n\n  [p * 2 for p in prices]          # transform every item\n  [p for p in prices if p > 100]   # keep only some items\n\nRead it left to right: "give me (expression) for each item in the list (optionally, if condition)." The original list is never changed — you always get a brand new one.',
    examples: [
      { note: 'Transform every item:', code: 'prices = [100, 200, 300]\ndoubled = [p * 2 for p in prices]\nprint(doubled)   # [200, 400, 600]' },
      { note: 'It is just a normal loop, folded into one line:', code: '# this comprehension...\nsquares = [n * n for n in [1, 2, 3]]\n# ...does the same as this loop:\nsquares = []\nfor n in [1, 2, 3]:\n    squares.append(n * n)\nprint(squares)   # [1, 4, 9]' },
      { note: 'Add an if to filter:', code: 'nums = [5, 12, 8, 20]\nbig = [n for n in nums if n > 10]\nprint(big)   # [12, 20]' },
    ],
    glossary: [
      { term: 'comprehension', defn: 'compact for-loop that produces a list' },
      { term: 'transform', defn: 'do something to every item' },
      { term: 'filter', defn: 'keep only items that match a condition' },
    ],
    gotchas: [
      'Read it right-to-left: first the for, then the if (if any), then the expression at the start.',
      'Do not nest comprehensions until you are comfortable. They quickly get unreadable.',
      'A comprehension always returns a NEW list — the original is unchanged.',
    ],
    try_yourself: {
      prompt: 'Given prices = [100, 200, 300], use a comprehension to make a new list with each price multiplied by 0.9 (10% off).',
      starter_py: 'prices = [100, 200, 300]\n# discounted = [...]'
    },
    try_hints: [
      'Pattern: [EXPRESSION for ITEM in LIST]',
      'discounted = [p * 0.9 for p in prices]',
      'Result: [90.0, 180.0, 270.0]',
    ],
    example: { schema: 'shopee', sql: '-- SQL equivalent — apply transformation to every row:\nSELECT order_amount, order_amount * 0.9 AS discounted FROM orders_regional LIMIT 5;' }
  },

  py_14_files: {
    t: 'Files — reading from disk',
    topic: 'files',
    pandas_progress: 88,
    why_pandas: 'pandas pd.read_csv(file_path) is built on top of Python file reading. Knowing how files work makes pandas import errors makeable.',
    what: 'To read a file you OPEN it, READ it, and it closes when you are done. The "with" statement does the closing for you automatically.\n\n  with open("data.txt", "r") as f:   # "r" = read mode\n      text = f.read()                # all the text as one string\n  print(text)\n\n.read() gives the whole file as one string; looping "for line in f" gives one line at a time.',
    examples: [
      { note: 'Read the whole file (a data.txt is preloaded here, so this runs):', code: 'with open("data.txt", "r") as f:\n    text = f.read()\nprint(text[:30])   # first 30 characters' },
      { note: 'Read it line by line:', code: 'with open("data.txt", "r") as f:\n    for line in f:\n        print(line.strip())   # one row at a time' },
    ],
    glossary: [
      { term: 'open(path, mode)', defn: 'opens a file. mode is "r" read, "w" write, "a" append' },
      { term: 'with statement', defn: 'auto-closes the file when done' },
      { term: 'context manager', defn: 'fancy name for "with"' },
    ],
    gotchas: [
      'File paths are different on Windows (C:\\) and Mac/Linux (/Users/). Use forward slashes or pathlib.',
      'If the file does not exist, you get FileNotFoundError. Wrap in try/except for safety.',
      'Forgetting to close a file leaks memory. ALWAYS use "with".',
    ],
    try_yourself: {
      prompt: 'data.txt is preloaded. Run this to read it, then change the loop so it prints only the FIRST line.',
      starter_py: 'with open("data.txt", "r") as f:\n    for line in f:\n        print(line.strip())\n# now make it print just the first line'
    },
    try_hints: [
      'To stop after the first line, you can break out of the loop.',
      'with open("data.txt") as f:\n    print(f.readline().strip())   # readline() grabs one line',
      'First line of the sample file: order_id,amount',
    ],
    example: { schema: 'shopee', sql: '-- pd.read_csv("orders.csv") is the pandas wrapper around this.\n-- Cannot demo file reading in SQL editor.\nSELECT \'pretend this is from a CSV\' AS source;' }
  },

  py_15_imports: {
    t: 'Imports — bringing in pandas',
    topic: 'imports',
    pandas_progress: 94,
    why_pandas: 'Every pandas script starts with "import pandas as pd". Understanding what this line does is the gateway.',
    what: '"import X" loads a library so you can use its tools. "import X as Y" gives it a short nickname.\n\n  import pandas as pd      # now write pd.read_csv(...) not pandas.read_csv(...)\n  from math import sqrt    # grab just one tool: sqrt(25)\n\n"pd" for pandas is a universal convention — everyone uses it, so stick with it.',
    examples: [
      { note: 'Import a whole module and use it:', code: 'import math\nprint(math.sqrt(25))   # 5.0\nprint(math.pi)         # 3.14159...' },
      { note: 'The "as" nickname (this is THE pandas line):', code: 'import pandas as pd\ndf = pd.DataFrame({"x": [1, 2, 3]})\nprint(df)' },
      { note: 'Grab just one thing with "from":', code: 'from math import sqrt\nprint(sqrt(81))   # 9.0  (no math. prefix needed)' },
    ],
    glossary: [
      { term: 'module', defn: 'a file or package of Python code you can import' },
      { term: 'import x', defn: 'load module x' },
      { term: 'import x as y', defn: 'load x but call it y for short' },
      { term: 'from x import y', defn: 'load only y from module x' },
    ],
    gotchas: [
      'If pandas is not installed, you get ModuleNotFoundError. Run: pip install pandas.',
      'You can pick any alias, but "pd" is universal. Do not invent your own.',
      'Imports usually go at the top of your file. All of them, together.',
    ],
    try_yourself: {
      prompt: 'Run the math import below to see it work, then add the standard pandas import line underneath (conventional two-letter alias).',
      starter_py: "import math\nprint(math.sqrt(25))\n# add the standard pandas import below:"
    },
    try_hints: [
      'The pandas convention is two letters.',
      'import pandas as pd',
      'After that line, pd.DataFrame, pd.read_csv, pd.merge all become available.',
    ],
    example: { schema: 'shopee', sql: '-- SQL has no imports — the database engine runs everything.\nSELECT \'imports = python only\' AS note;' }
  },

  py_16_numpy: {
    t: 'NumPy lite — the engine under pandas',
    topic: 'numpy',
    pandas_progress: 100,
    why_pandas: 'pandas is built ON TOP of numpy. Every pandas Series is secretly a numpy array. You do not need to master numpy — but knowing the basics makes pandas debugging much easier.',
    what: 'numpy gives you a fast ARRAY — like a list, but built for math.\n\n  import numpy as np\n  arr = np.array([1, 2, 3])\n  arr * 2          # -> array([2, 4, 6])  (every element at once)\n\nThe big idea: math applies to the WHOLE array at once, no loop needed. This is exactly how pandas columns work — a pandas Series is a numpy array underneath.',
    examples: [
      { note: 'Whole-array math (no loop):', code: 'import numpy as np\narr = np.array([10, 20, 30])\nprint(arr * 3)     # [30 60 90]\nprint(arr + 1)     # [11 21 31]' },
      { note: 'Compare with a plain list (very different!):', code: 'print([1, 2] * 2)               # [1, 2, 1, 2]  (repeats)\nimport numpy as np\nprint(np.array([1, 2]) * 2)     # [2 4]        (doubles)' },
      { note: 'Quick stats come built in:', code: 'import numpy as np\narr = np.array([10, 20, 30])\nprint(arr.sum(), arr.mean(), arr.max())   # 60 20.0 30' },
    ],
    glossary: [
      { term: 'array', defn: 'numpy version of a list — same type, fast' },
      { term: 'vectorized', defn: 'operation applies to all elements automatically' },
      { term: 'np', defn: 'standard alias for numpy' },
    ],
    gotchas: [
      'numpy arrays must hold ONE type. np.array([1, "two"]) silently converts to all strings.',
      'List math: [1, 2] * 2 gives [1, 2, 1, 2]. Numpy math: np.array([1, 2]) * 2 gives [2, 4]. They differ!',
    ],
    try_yourself: {
      prompt: 'Mentally trace: np.array([10, 20, 30]) * 3. What do you get?',
      starter_py: 'import numpy as np\narr = np.array([10, 20, 30])\n# what is arr * 3?'
    },
    try_hints: [
      'Numpy multiplies each element.',
      'arr * 3 returns array([30, 60, 90])',
      'You are now ready for pandas. import pandas as pd, and start.',
    ],
    example: { schema: 'shopee', sql: '-- pandas Series math is column-wide, like numpy.\nSELECT order_amount, order_amount * 3 AS tripled FROM orders_regional LIMIT 5;' }
  },


setup: {
  t: 'Setup — Connect Python to a Database (the easy way)',
  what: "Think of pandas as Excel, but inside Python. Think of SQLite as a database that lives in one .db file. This lesson shows you how to open the file, run a SQL query, and get the result back as something you can use — a DataFrame (basically an Excel sheet, but in code).",
  when: "ONCE at the start of every Python script that touches data. You'll do this so often it becomes muscle memory.",
  tables_involved: "Doesn't matter — pandas reads any table you ask for.",
  written_order: ["1. (one-time, in Terminal):  pip install pandas","2. (in your script):  import pandas as pd","3. (in your script):  import sqlite3","4. conn = sqlite3.connect('shopee.db')","5. df = pd.read_sql('SELECT...', conn)"],
  exec_order: ["1. Install pandas — only ONCE per computer, in Terminal","2. Import the libraries — every script needs this","3. Connect — opens the .db file","4. Run query — get back a DataFrame","5. Look at it — df.head() shows the first 5 rows"],
  pandas: `# THE WHOLE THING — 6 LINES.

# 1. Install pandas. Run this ONCE in your Terminal, not in your script:
#    pip install pandas

# 2. Now in your Python script:
import pandas as pd
import sqlite3

# 3. Open the database file (just like opening an Excel file):
conn = sqlite3.connect('shopee.db')

# 4. Run a SQL query. Result comes back as a "DataFrame" (=Excel sheet):
df = pd.read_sql("SELECT * FROM shopee_users WHERE country = 'ID'", conn)

# 5. Peek at it:
df.head()              # first 5 rows
df.shape               # how many rows × cols?
df['country']          # one column

# That's it. You're now reading SQL from Python.`,
  glossary: [
    {term:'pandas', defn:"A Python library that gives you Excel-like tables in code. Everyone uses it for data work."},
    {term:'pip install pandas', defn:"Run this ONCE in your Terminal (not in your script). Like installing an app — you only do it the first time."},
    {term:'import pandas as pd', defn:"Tells Python: 'I want to use pandas, and I'll call it pd for short.' Convention everyone uses."},
    {term:'sqlite3', defn:"Already built into Python. Lets you open .db files. No install needed."},
    {term:'.db file', defn:"A whole database stored in one file. SQLite is the simplest kind."},
    {term:'conn (connection)', defn:"Your open link to the database. Reuse this for many queries."},
    {term:'pd.read_sql(query, conn)', defn:"The magic line. Runs your SQL and hands back a DataFrame. The most useful 1-liner in data work."},
    {term:'DataFrame', defn:"An Excel sheet, but in Python. Has rows, columns, and an index. Usually called df."},
    {term:'df.head()', defn:"Shows the first 5 rows of your DataFrame — like scrolling to the top of an Excel sheet."},
  ],
  rules: [
    "You only run `pip install pandas` ONCE per computer. Not every time you write a script.",
    "Always do `import pandas as pd` and `import sqlite3` at the very top of your script.",
    "For the Alooba SQL test, you write SQL ONLY. Pandas is what you'll use AT WORK after passing the test."
  ],
  example: {
    desc: "Pull the first 5 active Indonesian users into a DataFrame. (This is what `pd.read_sql` would do behind the scenes.)",
    schema: 'shopee',
    sql: "SELECT user_id, username, country, acct_status\nFROM shopee_users\nWHERE country = 'ID' AND acct_status = 'ACTIVE'\nLIMIT 5;",
  },
  try_yourself: {
    prompt: 'Run the pandas+sqlite combo end-to-end. The Shopee/Lazada/Agoda databases are pre-loaded — just connect.',
    starter_py: "import pandas as pd\nimport sqlite3\n\nconn = sqlite3.connect('shopee.db')\ndf = pd.read_sql(\"SELECT * FROM shopee_users WHERE country = 'ID' LIMIT 5\", conn)\nprint(df)"
  },
  try_hints: [
    'shopee.db, lazada.db, and agoda.db are pre-loaded into Pyodide.',
    'sqlite3.connect("shopee.db"), then pd.read_sql(query, conn).',
    'After running, df is a DataFrame. print(df) shows the rows.',
  ],
},
foundations: {
  t: 'SELECT · FROM · WHERE — Reading Tables',
  what: "SELECT picks columns, FROM picks the table, WHERE filters rows. These three keywords run every analytics query you'll ever write.",
  when: "Every query. Roughly 80% of what you write at work is some flavor of SELECT col FROM table WHERE condition.",
  tables_involved: "1 table (single-source). Multi-table is JOINs (next category).",
  written_order: ['SELECT','FROM','WHERE','ORDER BY','LIMIT'],
  exec_order: ['FROM','WHERE','SELECT','ORDER BY','LIMIT'],
  pandas: `# pandas equivalent — note WHERE happens FIRST (filter), SELECT second (project)\ndf[df['country']=='ID'][['user_id','username']]`,
  glossary: [
    {term:'SELECT', defn:'Pick which columns appear in the result. Called "projection" in relational algebra.'},
    {term:'FROM', defn:'The source table you read from.'},
    {term:'WHERE', defn:"Row-level filter. Runs BEFORE any aggregation. Each condition is a 'predicate'."},
    {term:'predicate', defn:"A condition like country='ID'. Returns TRUE/FALSE/NULL per row."},
    {term:'IN list', defn:"Shorthand for multiple OR conditions: WHERE country IN ('TH','ID','MY')."},
    {term:'BETWEEN', defn:"Inclusive range. WHERE x BETWEEN 1 AND 10 includes 1 and 10."},
    {term:'LIKE', defn:"Pattern match. % = any chars, _ = exactly one char."},
    {term:'NULL', defn:"Special 'unknown' value. Never compare with =. Use IS NULL / IS NOT NULL."},
    {term:'.loc / .query (pandas)', defn:".loc[mask] is index-aware boolean filter; .query('country == \\'ID\\'') is string-based."},
  ],
  rules: [
    "Operator precedence: AND binds tighter than OR. Always wrap mixed AND/OR in parentheses.",
    "= NULL ALWAYS returns NULL (not TRUE). Use IS NULL / IS NOT NULL — three-valued logic.",
    "Strings use single quotes 'TH'. Double quotes are for identifiers in some dialects.",
    "SQL is 1-indexed (SUBSTR start=1 is first char). Python/pandas is 0-indexed (s[0] is first). Classic off-by-one source.",
    "SQL keywords are case-insensitive (SELECT = select), but UPPERCASE convention aids readability.",
  ],
  example: {
    desc: "Get Indonesian users who are still active. Project just user_id, username, country.",
    schema: 'shopee',
    sql: "SELECT user_id, username, country\nFROM shopee_users\nWHERE country = 'ID' AND acct_status = 'ACTIVE';",
  },
},
aggregation: {
  t: 'COUNT · SUM · AVG · GROUP BY · HAVING — Collapsing Rows',
  what: "Aggregation collapses many rows into one summary value per group. COUNT counts. SUM adds. AVG averages. GROUP BY decides the buckets. HAVING filters AFTER aggregation.",
  when: "Any time you ask 'per X, how many / how much'. Per country, per shop, per day, per category.",
  tables_involved: "Often 1 table; sometimes 2-3 after a JOIN.",
  written_order: ['SELECT','FROM','WHERE','GROUP BY','HAVING','ORDER BY','LIMIT'],
  exec_order: ['FROM','WHERE','GROUP BY','HAVING','SELECT','ORDER BY','LIMIT'],
  pandas: `# pandas: groupby + agg\ndf.groupby('country')['gmv_usd'].sum().reset_index(name='total_gmv')\n# Multi-aggregate:\ndf.groupby('shop_id').agg(orders_n=('order_id','count'), gmv=('gmv_usd','sum'))`,
  glossary: [
    {term:'GROUP BY', defn:"Bucket rows by one or more columns. Every row becomes a member of exactly one bucket."},
    {term:'HAVING', defn:"Filter on aggregated values. Runs AFTER GROUP BY."},
    {term:'COUNT(*)', defn:"Counts all rows in a group, including those with NULLs."},
    {term:'COUNT(col)', defn:"Counts only non-NULL values in that column."},
    {term:'COUNT(DISTINCT col)', defn:"Unique-value count. Slow on big tables."},
    {term:'AVG / MEAN', defn:"Sum divided by count of non-NULL values."},
    {term:'aggregate function', defn:"A function that takes a SET of rows and returns ONE value. SUM, COUNT, AVG, MIN, MAX."},
    {term:'.agg() (pandas)', defn:"Apply named aggregations. .agg(name=('col', 'sum'))."},
  ],
  rules: [
    "Every column in SELECT must be either in GROUP BY or wrapped in an aggregate function.",
    "WHERE filters rows BEFORE aggregation. HAVING filters groups AFTER aggregation.",
    "You CANNOT use an aggregate (SUM/COUNT) inside WHERE — they don't exist yet at WHERE time.",
    "AVG ignores NULL values. To treat NULL as 0, use AVG(COALESCE(col, 0)).",
    "COUNT(*) counts rows including NULLs. COUNT(col) ignores NULL in that column. Different answers!",
  ],
  example: {
    desc: "Total completed GMV per country, only countries with 2+ orders.",
    schema: 'shopee',
    sql: "SELECT country, SUM(gmv_usd) AS total_gmv, COUNT(*) AS n_orders\nFROM orders_regional\nWHERE status = 'COMPLETED'\nGROUP BY country\nHAVING COUNT(*) >= 2\nORDER BY total_gmv DESC;",
  },
},
joins: {
  t: 'JOINs — Combining Multiple Tables',
  what: "JOINs stitch tables together on a key. INNER keeps only matched rows. LEFT keeps every row from the left table (NULL for unmatched). RIGHT is the mirror. FULL keeps all rows from both sides. CROSS pairs every row with every row.",
  when: "Any time the data you need is split across tables — orders + users, products + sellers, bookings + hotels.",
  tables_involved: "2 minimum, but 3-5 is common. Each JOIN line adds one more table.",
  written_order: ['SELECT','FROM table1 a','JOIN table2 b ON a.key = b.key','WHERE','GROUP BY','...'],
  exec_order: ['FROM','JOIN ON','WHERE','GROUP BY','HAVING','SELECT','ORDER BY','LIMIT'],
  pandas: `# pandas: merge\nm = orders.merge(users, on='user_id', how='inner')   # INNER\nm = orders.merge(users, on='user_id', how='left')    # LEFT\n# Anti-join (rows in left with NO match in right):\nm = users.merge(orders[['user_id']], on='user_id', how='left', indicator=True)\nantijoin = m[m['_merge']=='left_only']`,
  glossary: [
    {term:'INNER JOIN', defn:"Only rows where the key matches in BOTH tables."},
    {term:'LEFT JOIN', defn:"All rows from LEFT table; NULL on the right for unmatched rows."},
    {term:'RIGHT JOIN', defn:"All rows from RIGHT table; NULL on the left. SQLite has no RIGHT — flip and use LEFT."},
    {term:'FULL OUTER JOIN', defn:"All rows from both sides; NULL where unmatched. Less common."},
    {term:'CROSS JOIN', defn:"Cartesian product — every row × every row. Rare. Used for date series, combinations."},
    {term:'anti-join', defn:"Rows in A with NO match in B. Pattern: LEFT JOIN B WHERE B.key IS NULL."},
    {term:'semi-join', defn:"Rows in A WITH a match in B (but you don't need B's columns). Pattern: WHERE EXISTS (SELECT 1 FROM B WHERE B.k = A.k)."},
    {term:'fan-out', defn:"When a one-to-many JOIN multiplies rows. SUM after fan-out double-counts."},
    {term:'.merge() (pandas)', defn:"how='inner'/'left'/'right'/'outer'/'cross'. on= or left_on/right_on. validate='m:1' to assert."},
  ],
  rules: [
    "Always check JOIN cardinality. orders → order_items is 1-to-many. SUM(orders.total) after that JOIN double-counts!",
    "ON vs WHERE on a LEFT JOIN: a condition in ON keeps the left row even if right doesn't match. Same condition in WHERE drops it.",
    "USING (col) requires identical column names; ON a.k = b.k works for differently-named keys.",
    "SQLite + BigQuery don't support RIGHT JOIN. Postgres + MySQL + SQL Server do. Flip tables and use LEFT for portability.",
    "Anti-join (LEFT JOIN ... WHERE right.key IS NULL) and NOT EXISTS are equivalent and both safer than NOT IN (NULL trap).",
  ],
  example: {
    desc: "Each completed order with the buyer's country (from users) and the seller's tier.",
    schema: 'shopee',
    sql: "SELECT o.order_serial_number, u.country, s.tier, o.gmv_usd\nFROM orders_regional o\nINNER JOIN shopee_users u ON o.buyer_user_id = u.user_id\nINNER JOIN seller_performance_metrics s ON o.shop_id = s.shop_id\nWHERE o.status = 'COMPLETED'\nLIMIT 10;",
  },
},
windows: {
  t: 'Window Functions — Calc Without Collapsing',
  what: "Window functions compute across rows related to the current row WITHOUT collapsing them. Same row count in/out. ROW_NUMBER labels each row 1..N. LAG peeks at the previous row. SUM OVER gives running totals.",
  when: "Per-group ranking ('top N per category'), period-over-period deltas (DoD/MoM/YoY), running totals, percentiles, share-of-total.",
  tables_involved: "Usually 1, but often combined with JOINs.",
  written_order: ['SELECT','func() OVER (PARTITION BY ... ORDER BY ... ROWS BETWEEN ...)','FROM','...'],
  exec_order: ['FROM','WHERE','GROUP BY','HAVING','window functions','SELECT','ORDER BY'],
  pandas: `# pandas equivalents\ndf.groupby('user_id').cumcount() + 1     # ROW_NUMBER\ndf['col'].rank(method='dense')           # DENSE_RANK\ndf['col'].shift(1)                       # LAG (1)\ndf['col'].rolling(7).mean()              # AVG OVER (ROWS BETWEEN 6 PRECEDING)`,
  glossary: [
    {term:'OVER ()', defn:"The window definition. Empty () means whole result set."},
    {term:'PARTITION BY', defn:"Reset window per group. Like GROUP BY but doesn't collapse rows."},
    {term:'ORDER BY (inside OVER)', defn:"Defines row sequence within the window — required for ROW_NUMBER/RANK/LAG."},
    {term:'ROW_NUMBER()', defn:"Assigns 1, 2, 3... uniquely within the window. Ties get arbitrary ordering."},
    {term:'RANK()', defn:"1, 2, 2, 4 — ties share rank, then SKIP."},
    {term:'DENSE_RANK()', defn:"1, 2, 2, 3 — ties share rank, NO skip."},
    {term:'LAG(col, n)', defn:"Value n rows BEFORE current row. Default n=1."},
    {term:'LEAD(col, n)', defn:"Value n rows AFTER current row."},
    {term:'frame', defn:"ROWS BETWEEN x PRECEDING AND y FOLLOWING — sliding window inside the partition."},
    {term:'NTILE(n)', defn:"Bucket rows into n quantile groups (4 = quartiles, 100 = percentiles)."},
  ],
  rules: [
    "ROW_NUMBER vs RANK vs DENSE_RANK matter when ties exist. Pick based on whether you want 1 row per tie group or all of them.",
    "Window functions run AFTER WHERE and HAVING. You can't filter on a window result in WHERE — use a CTE.",
    "Default frame for ORDER BY is RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW. Surprises with running totals if data has duplicates — explicit ROWS BETWEEN is safer.",
    "PARTITION BY with no ORDER BY is valid but rarely useful — most window functions need order.",
    "pandas .rank() defaults to 'average' (ties get mean rank). Use method='dense' for DENSE_RANK behavior.",
  ],
  example: {
    desc: "Number each user's orders in time order, then keep only their first one.",
    schema: 'shopee',
    sql: "WITH r AS (\n  SELECT order_serial_number, buyer_user_id, create_time,\n         ROW_NUMBER() OVER (PARTITION BY buyer_user_id ORDER BY create_time) AS seq\n  FROM orders_regional\n)\nSELECT * FROM r WHERE seq = 1\nORDER BY buyer_user_id;",
  },
},
cte: {
  t: 'CTEs (WITH) & Subqueries — Multi-Step Logic',
  what: "A CTE is a named temporary result. WITH name AS (...) lets you define a step, then reuse it. Subqueries are similar but inline — useful for one-shot scalar/list/EXISTS checks.",
  when: "Multi-step pipelines: filter, aggregate, rank, then return. CTEs make each step readable. Recursive CTEs walk hierarchies.",
  tables_involved: "Same as the inner queries — typically 1-3 tables per CTE step.",
  written_order: ['WITH cte_a AS (SELECT ...)','cte_b AS (SELECT ... FROM cte_a)','SELECT ... FROM cte_b'],
  exec_order: ['Each CTE evaluated in declared order','then main SELECT'],
  pandas: `# pandas equivalent — assign intermediate DataFrames\npaid = orders[orders['status'].isin(['paid','shipped','delivered'])]\ngmv  = paid.groupby('country')['total_amount'].sum().reset_index()`,
  glossary: [
    {term:'WITH', defn:"Defines a CTE. Multiple CTEs separated by commas; the last one ends with the main SELECT."},
    {term:'CTE (Common Table Expression)', defn:"A named subquery scoped to one statement."},
    {term:'recursive CTE', defn:"WITH RECURSIVE cte AS (anchor SELECT UNION ALL recursive SELECT). Walks trees / sequences."},
    {term:'scalar subquery', defn:"Returns ONE value: WHERE x > (SELECT AVG(x) FROM t)."},
    {term:'IN subquery', defn:"WHERE id IN (SELECT id FROM t WHERE ...)."},
    {term:'correlated subquery', defn:"Inner query references outer query's row. Re-runs per outer row. Often slower."},
    {term:'EXISTS', defn:"WHERE EXISTS (SELECT 1 FROM t WHERE ...). True if subquery returns any row."},
    {term:'derived table', defn:"Subquery in FROM clause. Same as a CTE but inline."},
  ],
  rules: [
    "CTEs are scoped to ONE statement. They vanish after the query.",
    "Some engines materialize CTEs (cache the result), some don't. Check your dialect's behavior on big data.",
    "Recursive CTEs require a UNION ALL (not UNION) and a termination condition or they loop forever.",
    "NOT IN with NULLs in the subquery returns no rows. Always prefer NOT EXISTS for safer semantics.",
    "If you reference a CTE multiple times, modern engines often re-evaluate it. Materialize via temp table if expensive.",
  ],
  example: {
    desc: "Two-step CTE: first paid orders only, then GMV per country.",
    schema: 'shopee',
    sql: "WITH paid AS (\n  SELECT * FROM orders_regional WHERE status IN ('COMPLETED','SHIPPED')\n)\nSELECT country, SUM(gmv_usd) AS gmv\nFROM paid\nGROUP BY country\nORDER BY gmv DESC;",
  },
},
conditional: {
  t: 'CASE · COALESCE · NULLIF — Conditional Logic',
  what: "CASE WHEN is SQL's if/else. COALESCE returns the first non-NULL. NULLIF returns NULL when two values match. Together they handle most NULL/conditional plumbing.",
  when: "Bucketing values into categories ('small'/'mid'/'big'). Pivoting (one column per category). Defaulting NULL to 0. Avoiding divide-by-zero.",
  tables_involved: "1, usually. Used inside SELECT or WHERE.",
  written_order: ['SELECT col, CASE WHEN ... THEN ... ELSE ... END AS label','FROM table'],
  exec_order: ['Same as enclosing SELECT'],
  pandas: `# pandas equivalents\nimport numpy as np\ndf['tier'] = np.where(df['gmv'] > 100, 'big', 'small')   # binary\npd.cut(df['gmv'], bins=[0,50,200,np.inf], labels=['low','mid','high'])   # multi-bucket\ndf['col'].fillna(0)              # COALESCE(col, 0)`,
  glossary: [
    {term:'CASE WHEN ... THEN ... ELSE ... END', defn:"Searched CASE — checks each WHEN top-down."},
    {term:'COALESCE(a,b,c)', defn:"Returns the first non-NULL argument."},
    {term:'NULLIF(a,b)', defn:"Returns NULL if a = b, else returns a. Used to avoid division by zero."},
    {term:'IFNULL(a,b)', defn:"MySQL/SQLite shorthand for COALESCE with 2 args."},
    {term:'conditional aggregation', defn:"SUM(CASE WHEN ... THEN x ELSE 0 END) — the SQL pivot pattern."},
    {term:'np.where (pandas)', defn:"Vectorized if/else. np.where(cond, a, b)."},
    {term:'pd.cut (pandas)', defn:"Multi-bucket categorization with bin edges and labels."},
  ],
  rules: [
    "Always include ELSE. Without it, unmatched rows return NULL — usually a bug.",
    "CASE evaluates top-down; first matching WHEN wins. Order matters when conditions overlap.",
    "Combine NULLIF + COALESCE for safe division: COALESCE(a / NULLIF(b, 0), 0).",
    "SUM(CASE WHEN x THEN 1 ELSE 0 END) is the row-counting idiom. AVG(CASE...) gives the rate.",
    "fillna(0) propagates if you chain it; .fillna(0).astype(int) is common when the column was 0/1.",
  ],
  example: {
    desc: "Bucket completed orders into small / mid / big and count each.",
    schema: 'shopee',
    sql: "SELECT\n  CASE WHEN gmv_usd < 50 THEN 'small'\n       WHEN gmv_usd < 200 THEN 'mid'\n       ELSE 'big' END AS tier,\n  COUNT(*) AS n\nFROM orders_regional\nWHERE status = 'COMPLETED'\nGROUP BY tier;",
  },
},
strings_dates: {
  t: 'String & Date Functions',
  what: "Strings: SUBSTR, INSTR, LIKE/GLOB, TRIM, LOWER/UPPER, ||/CONCAT, REPLACE. Dates: strftime / DATE_FORMAT to extract parts; julianday / DATEDIFF to compute diffs; date arithmetic with INTERVAL or modifiers.",
  when: "Cleaning text data, extracting structure from IDs, computing time differences, bucketing by month/week, building display labels.",
  tables_involved: "1, usually applied per row.",
  written_order: ["SELECT SUBSTR(col, start, len), strftime('%Y-%m', date) FROM ..."],
  exec_order: ['Same as enclosing SELECT/WHERE'],
  pandas: `# pandas: .str accessor for strings, .dt for dates\ndf['email'].str.lower().str.contains('@shopee')\ndf['email'].str.extract(r'@(.+)$')               # regex capture\nimport pandas as pd\nd = pd.to_datetime(df['order_date'])\nd.dt.year, d.dt.month, d.dt.day_name()\n(d.dt.date - pd.Timestamp('2024-01-01').date()).days  # date diff`,
  glossary: [
    {term:'SUBSTR(s, start, len)', defn:"Slice. SQL is 1-indexed: SUBSTR('hello', 1, 3) = 'hel'."},
    {term:'INSTR(s, needle)', defn:"Position of needle in s, 1-indexed. 0 if not found."},
    {term:'||', defn:"String concatenation in SQLite/Postgres/Oracle. MySQL uses CONCAT()."},
    {term:'LIKE', defn:"Pattern: % = any chars, _ = single char. Case-insensitive in SQLite by default."},
    {term:'GLOB', defn:"SQLite extension. Supports [0-9] character classes, * for any chars."},
    {term:'TRIM(s)', defn:"Removes leading + trailing whitespace. LTRIM and RTRIM for one side."},
    {term:'strftime(format, date)', defn:"SQLite format date. %Y, %m, %d, %H, %M, %w (weekday)."},
    {term:'julianday(date)', defn:"Float days since epoch. Diff = end - start in days."},
    {term:'date(d, modifier)', defn:"date('2026-05-01', '-30 days') = 2026-04-01."},
    {term:'DATEDIFF', defn:"MySQL: DATEDIFF(end, start) returns int days. SQL Server: DATEDIFF(unit, start, end)."},
    {term:'.str (pandas)', defn:".str.contains, .str.extract, .str.split, .str.replace — vectorized string ops."},
    {term:'.dt (pandas)', defn:"Access datetime parts: .dt.year, .dt.month, .dt.dayofweek (0=Mon), .dt.day_name()."},
  ],
  rules: [
    "SQL is 1-indexed (SUBSTR start=1). Python/pandas is 0-indexed (s[0]). Off-by-one source.",
    "pandas .dt.dayofweek: 0=Monday..6=Sunday. SQL strftime('%w'): 0=Sunday..6=Saturday. DIFFERENT conventions!",
    "Always store dates in ISO format 'YYYY-MM-DD' for portable lexicographic sorting.",
    "LIKE has 2 wildcards: % and _. To match a literal underscore, use ESCAPE clause or GLOB.",
    "Avoid leading-wildcard LIKE ('%abc'). It bypasses indexes — full table scan on big tables.",
  ],
  example: {
    desc: "Extract the date prefix and region from each order_serial_number (format YYMMDD<region><seq>).",
    schema: 'shopee',
    sql: "SELECT order_serial_number,\n       SUBSTR(order_serial_number, 1, 6) AS date_prefix,\n       SUBSTR(order_serial_number, 7, 3) AS region\nFROM orders_regional\nLIMIT 5;",
  },
},
advanced: {
  t: 'Advanced — UNION, Self-Joins, Gaps & Islands',
  what: "UNION/UNION ALL stack queries vertically. Self-joins compare a table to itself (consecutive rows, pair generation). Gaps & Islands finds streaks (consecutive logins, runs of identical values).",
  when: "Building unified event logs (orders + reviews + tickets in one timeline). Comparing periods. Finding consecutive runs (3-day login streaks). Cumulative totals.",
  tables_involved: "Often 1 table joined to itself, or N tables UNION'd.",
  written_order: ['SELECT ... FROM A','UNION ALL','SELECT ... FROM B'],
  exec_order: ['Each branch evaluated independently','then UNION/UNION ALL combines'],
  pandas: `# pandas equivalents\npd.concat([df_a, df_b], ignore_index=True)         # UNION ALL\npd.concat([df_a, df_b]).drop_duplicates()          # UNION (dedupe)\n# Gaps & Islands trick:\ndf['grp'] = df['login_date'] - pd.to_timedelta(df.groupby('user_id').cumcount(), unit='D')\nstreaks = df.groupby(['user_id','grp']).size()`,
  glossary: [
    {term:'UNION', defn:"Combine two queries' results, removing duplicates. Costs a sort/hash."},
    {term:'UNION ALL', defn:"Same but KEEPS duplicates. Faster. Use when you know there are no overlaps."},
    {term:'INTERSECT', defn:"Rows present in BOTH queries."},
    {term:'EXCEPT (or MINUS)', defn:"Rows in A NOT in B."},
    {term:'self-join', defn:"Joining a table to itself with aliases. Used to compare consecutive rows or find pairs."},
    {term:'gaps and islands', defn:"Pattern for finding consecutive sequences. Trick: subtract row_number from date — consecutive dates produce identical group keys."},
    {term:'cumulative sum', defn:"Running total. SUM(...) OVER (ORDER BY date)."},
    {term:'pivot (SQL)', defn:"Conditional aggregation: SUM(CASE WHEN status='paid' THEN 1 ELSE 0 END) per category."},
  ],
  rules: [
    "All UNION'd queries must have the same number and type of columns.",
    "Prefer UNION ALL unless you specifically need dedup. UNION is significantly slower on large data.",
    "Self-joins: always alias both copies. WHERE a.id < b.id is the dedup trick for unordered pairs.",
    "Gaps & Islands: sort + ROW_NUMBER + date arithmetic. The 'magic' is that consecutive dates produce identical (date - rownum) values.",
    "When stacking heterogeneous events with UNION ALL, project a common shape: (id, event_type, event_time, amount).",
  ],
  example: {
    desc: "Unified user-event log: orders + returns interleaved by time.",
    schema: 'shopee',
    sql: "SELECT buyer_user_id AS user_id, 'order' AS event, create_time AS dt, gmv_usd AS amount FROM orders_regional\nUNION ALL\nSELECT o.buyer_user_id, 'return', r.judge_time, r.refund_amount_usd\nFROM order_returns r INNER JOIN orders_regional o ON r.order_serial_number = o.order_serial_number\nORDER BY user_id, dt\nLIMIT 20;",
  },
},

  mp_01_why: {
    t: 'Why charts? — patterns hide in tables',
    topic: 'charting',
    chart_progress: 8,
    why_chart: 'A 1,000-row table hides patterns. One chart shows them. In an Alooba interview, "explain this trend" wants a chart. Same in real analyst work.',
    what: 'Charts turn rows into shapes you can SEE. The brain spots a spike on a line in 0.1s; it cannot read 100 numbers in the same time. Pick a chart for the question you are answering.',
    glossary: [
      { term: 'visualization', defn: 'fancy word for chart' },
      { term: 'matplotlib', defn: 'the standard Python charting library' },
      { term: 'plot', defn: 'a single chart' },
    ],
    gotchas: [
      'A chart without a clear question is decoration.',

    try_yourself: {

    example: { schema: 'shopee', sql: '-- Get the data a chart could plot:\nSELECT order_date, SUM(order_amount) AS daily_total FROM orders_regional GROUP BY order_date ORDER BY order_date LIMIT 7;' }
  },

    why_chart: 'Stop chart-shopping. 90% of analyst work uses 4 chart types. Master these; the fancy ones come later.',

      { term: 'continuous', defn: 'a number that can be anything — price, age' },
      { term: 'distribution', defn: 'how values spread out' },
    ],
    gotchas: [
      'Bar vs histogram: bar = compare categories. Histogram = bins of one continuous number.',

    try_yourself: {
      prompt: 'Pick the chart for each question: (a) which country sold most? (b) how does revenue change daily? (c) does a higher price reduce orders? (d) what is the typical order size?',

    try_hints: [

    ],

  mp_06_bar: {
    t: 'Bar chart — compare categories',
    topic: 'charting',

hint:"LIKE with the % wildcard at the START matches any prefix. The pattern '%@shopee.com' captures emails ending exactly that way.",
sql:`SELECT user_id, email\nFROM shopee_users\nWHERE email LIKE '%@shopee.com';`,
pandas:`import pandas as pd, sqlite3\nconn = sqlite3.connect('shopee.db')\ndf = pd.read_sql("SELECT * FROM shopee_users", conn)\nstaff = df[df['email'].str.endswith('@shopee.com', na=False)]\nprint(staff[['user_id','email']])`,
explanation:"LIKE matches by pattern. % means any chars (zero or more). Internal staff have emails on the corporate domain — this is a textbook 'who has access?' query you'll write on day 1 of any analyst job.",
rule:"NEVER use `= NULL` to find missing values — always `IS NULL`. SQL's three-valued logic (TRUE/FALSE/NULL) makes `= NULL` always return NULL (not TRUE)."},

pandas:`df[(df.country=='ID') & (df.acct_status=='ACTIVE')][['user_id','username','last_active_time']]`,
explanation:"Two conditions on the same row, AND-joined. The pandas equivalent uses & (not 'and') with parenthesized conditions."},

{n:3,sch:'shopee',cat:'foundations',d:1,t:'High-GMV Orders',cmds:['BETWEEN','ORDER BY'],

pandas:`o = pd.read_sql("SELECT * FROM orders_regional", conn)\nm = (o.status=='COMPLETED') & o.gmv_usd.between(50, 300)\nprint(o[m][['order_serial_number','country','gmv_usd']].sort_values('gmv_usd', ascending=False))`,

{n:5,sch:'shopee',cat:'foundations',d:1,t:'Top 5 Highest Orders',cmds:['ORDER BY','LIMIT'],
