function ChatPanel({ q, code, isConcept }) {
  return null; // AI Helper removed — it required pasting a live API key into a public page. The body below is dead/unreachable.
  const [messages, setMessages] = useState(() => {
    try { return JSON.parse(localStorage.getItem('chat_history_v2') || '[]'); }
    catch { return []; }
  });
  const [input, setInput] = useState('');
  const [toast, setToast] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('anthropic_api_key') || '');
  const [busy, setBusy] = useState(false);
  const [model, setModel] = useState(() => localStorage.getItem('claude_model') || 'claude-haiku-4-5-20251001');
  const saveModel = (m) => { setModel(m); localStorage.setItem('claude_model', m); };
  const MODELS = [
    { id: 'claude-haiku-4-5-20251001', label: 'Haiku 4.5 (fast, cheap)' },
    { id: 'claude-sonnet-4-6',         label: 'Sonnet 4.6 (smart)' },
    { id: 'claude-opus-4-6',           label: 'Opus 4.6 (smartest, $$$)' },
  ];

  const showToast = (msg, kind = 'info') => {
    setToast({ msg, kind });
    setTimeout(() => setToast(null), 3500);
  };
  const persist = (msgs) => {
    setMessages(msgs);
    localStorage.setItem('chat_history_v2', JSON.stringify(msgs));
  };
  const saveKey = (k) => {
    setApiKey(k);
    localStorage.setItem('anthropic_api_key', k);
  };

  const buildPrompt = (userMsg) => {
    const isC = q.type === 'concept';
    let ctx = '';
    if (isC) {
      ctx = 'I am reading a learning lesson titled "' + q.t + '".\n\nThe lesson teaches: ' + (q.what || '') + '\n\n';
    } else {
      ctx = 'I am doing a SQL practice question.\n\n' +
            'QUESTION TITLE: ' + q.t + '\n\n' +
            'FULL PROMPT: ' + q.prompt + '\n\n' +
            'MY CURRENT CODE:\n' + (code ? code : '(I have not written anything yet)') + '\n\n' +
            'EXPECTED REFERENCE SOLUTION (do NOT just paste the answer; explain principles):\n' + q.sql + '\n\n';
    }
    return ctx + 'MY QUESTION: ' + userMsg + '\n\nBe concise. Help me understand WHY, do not just dump the answer.';
  };

  const sendToClaude = async (msg) => {
    if (!apiKey) {
      showToast('Add your Anthropic API key in settings first.', 'warn');
      setShowSettings(true);
      return;
    }
    setBusy(true);
    const prompt = buildPrompt(msg);
    const userEntry = { role: 'user', text: msg, provider: 'Claude', ts: Date.now() };
    persist([userEntry, ...messages].slice(0, 20));
    setInput('');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: model,
          max_tokens: 1500,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || data.error?.type || ('HTTP ' + res.status));
      const text = (data.content && data.content[0] && data.content[0].text) || '(no response)';
      const aiEntry = { role: 'ai', text, provider: 'Claude', ts: Date.now() };
      persist([aiEntry, userEntry, ...messages].slice(0, 20));
    } catch (e) {
      const raw = (e.message || '').toLowerCase();
      let friendly = e.message;
      let hint = '';
      if (raw.includes('invalid x-api-key') || raw.includes('authentication') || raw.includes('invalid api key')) {
        friendly = 'Your Anthropic API key is invalid or revoked.';
        hint = 'Click Settings, paste a fresh key from console.anthropic.com/settings/keys.';
      } else if (raw.includes('credit balance') || raw.includes('billing')) {
        friendly = 'Your Anthropic account has no credit balance.';
        hint = 'Add credits at console.anthropic.com/settings/billing.';
      } else if (raw.includes('rate_limit') || raw.includes('rate limit') || raw.includes('429')) {
        friendly = 'Rate limit hit. Wait ~30 seconds and try again.';
        hint = '';
      } else if (raw.includes('not_found') || raw.includes('model_not_found') || raw.includes('does not exist')) {
        friendly = 'This Claude model is not available on your account.';
        hint = 'Pick a different model in the dropdown above.';
      } else if (raw.includes('overloaded')) {
        friendly = 'Anthropic servers are overloaded. Try again in a few seconds.';
        hint = '';
      } else if (raw.includes('cors') || raw.includes('failed to fetch')) {
        friendly = 'Network call blocked by browser.';
        hint = 'Open the file directly (file://) or via GitHub Pages.';
      }
      const text = hint ? friendly + '\n\nFix: ' + hint : friendly;
      const errEntry = { role: 'ai', text, provider: 'Claude', ts: Date.now(), isError: true };
      persist([errEntry, userEntry, ...messages].slice(0, 20));
      showToast('Claude call failed.', 'error');
    } finally {
      setBusy(false);
    }
  };

  const sendToExternal = (provider) => {
    const msg = input.trim();
    if (!msg) return;
    const prompt = buildPrompt(msg);
    try {
      navigator.clipboard.writeText(prompt);
      showToast('Prompt copied. Paste it into ' + provider + '.');
    } catch (_) {
      showToast('Could not access clipboard.', 'error');
    }
    const urls = { 'Claude': 'https://claude.ai/new', 'ChatGPT': 'https://chatgpt.com' };
    window.open(urls[provider], '_blank');
    const userEntry = { role: 'user', text: msg, provider: provider + ' (ext)', ts: Date.now() };
    persist([userEntry, ...messages].slice(0, 20));
    setInput('');
  };

  const onSend = () => {
    if (!input.trim() || busy) return;
    sendToClaude(input);
  };

  const quickPrompts = [
    { label: 'Explain', msg: 'Explain the core concept of this in plain English.' },
    { label: 'Hint only', msg: 'Give me a small hint. Do NOT give the full answer.' },
    { label: 'Why wrong?', msg: 'Why does my code not match the expected output?' },
    { label: 'Similar example', msg: 'Show me a different example using the same SQL technique.' },
  ];

  return (
    <aside className="w-full h-full bg-white border border-slate-200 rounded-lg flex flex-col overflow-hidden shadow-sm">

      {/* HEADER */}
      <div className="flex items-center justify-between px-4 py-2.5 border-b border-slate-200 bg-slate-50 flex-shrink-0">
        <div className="flex items-center gap-2">
          <div className="w-6 h-6 rounded bg-slate-900 text-white text-[10px] font-bold flex items-center justify-center tracking-tight">AI</div>
          <div className="leading-tight">
            <div className="text-slate-900 text-sm font-semibold">AI Helper</div>
            <select value={model} onChange={e => saveModel(e.target.value)} disabled={busy}
              className="text-[10px] text-slate-700 border border-slate-300 rounded bg-white px-1 py-0.5 focus:outline-none focus:border-slate-900 disabled:bg-slate-100 mt-0.5">
              {MODELS.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
            </select>
          </div>
        </div>
        <button onClick={() => setShowSettings(!showSettings)}
          className="text-[10px] text-slate-600 hover:text-slate-900 hover:bg-white border border-slate-200 px-2 py-1 rounded transition-colors">
          {showSettings ? 'Close' : 'Settings'}
        </button>
      </div>

      {/* SETTINGS (collapsible) */}
      {showSettings && (
        <div className="px-4 py-3 border-b border-slate-200 bg-slate-50 flex-shrink-0">
          <div className="text-xs font-semibold text-slate-800 mb-1.5">Connect Claude</div>
          <ol className="text-slate-600 text-[11px] space-y-0.5 mb-2 list-decimal list-inside leading-snug">
            <li>Get a key at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener" className="underline hover:text-slate-900">console.anthropic.com/settings/keys</a></li>
            <li>Add credit at <a href="https://console.anthropic.com/settings/billing" target="_blank" rel="noopener" className="underline hover:text-slate-900">billing</a> ($5 lasts a long time on Haiku)</li>
            <li>Paste the key below. Stored only in your browser.</li>
          </ol>
          <input
            type="password"
            value={apiKey}
            onChange={e => saveKey(e.target.value)}
            placeholder="Paste your Anthropic API key (sk-ant-...)"
            className="w-full text-xs font-mono border border-slate-300 bg-white rounded px-2 py-1.5 mb-1 focus:outline-none focus:ring-1 focus:ring-slate-900 focus:border-slate-900"
          />
          {apiKey && (
            <button onClick={() => { saveKey(''); showToast('Key removed.'); }}
              className="text-[10px] text-slate-600 hover:text-slate-900 underline">Remove key</button>
          )}
        </div>
      )}

      {/* QUICK PROMPTS */}
      <div className="px-4 py-2.5 border-b border-slate-200 flex-shrink-0">
        <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Quick prompts</div>
        <div className="grid grid-cols-2 gap-1.5">
          {quickPrompts.map(qp => (
            <button key={qp.label}
              onClick={() => setInput(qp.msg)}
              className="text-left text-[11px] bg-white hover:bg-slate-100 border border-slate-200 hover:border-slate-400 text-slate-700 hover:text-slate-900 rounded px-2 py-1.5 leading-tight transition-colors">
              {qp.label}
            </button>
          ))}
        </div>
      </div>

      {/* INPUT */}
      <div className="px-4 py-2.5 border-b border-slate-200 flex-shrink-0">
        <textarea
          value={input}
          onChange={e => setInput(e.target.value)}
          placeholder="Ask about this question"
          rows={3}
          disabled={busy}
          className="w-full text-xs border border-slate-300 rounded p-2 resize-none focus:outline-none focus:ring-1 focus:ring-slate-900 focus:border-slate-900 placeholder-slate-400 disabled:bg-slate-50"
        />
        <button onClick={onSend} disabled={!input.trim() || busy}
          className="w-full mt-1.5 text-xs font-semibold py-2 bg-slate-900 hover:bg-slate-800 disabled:bg-slate-300 disabled:cursor-not-allowed text-white rounded transition-colors">
          {busy ? 'Thinking...' : 'Ask Claude'}
        </button>
        <button onClick={() => sendToExternal('ChatGPT')} disabled={!input.trim()}
          className="w-full mt-1.5 text-[10px] py-1.5 bg-white hover:bg-slate-100 border border-slate-200 hover:border-slate-400 text-slate-700 disabled:opacity-40 disabled:cursor-not-allowed rounded font-medium transition-colors">
          Or copy prompt + open ChatGPT
        </button>
        {toast && (
          <div className={'mt-1.5 text-[10px] rounded px-2 py-1.5 border ' + (toast.kind === 'error' ? 'border-red-200 text-red-700 bg-red-50' : toast.kind === 'warn' ? 'border-amber-200 text-amber-800 bg-amber-50' : 'border-slate-300 text-slate-700 bg-slate-50')}>
            {toast.msg}
          </div>
        )}
      </div>

      {/* CONVERSATION (absorbs all remaining height — no gap possible) */}
      <div className="flex-1 min-h-0 overflow-y-auto px-4 py-3 bg-slate-50">
        <div className="text-[9px] font-bold text-slate-500 uppercase tracking-wider mb-2">Conversation</div>
        {messages.length === 0 ? (
          <div className="text-xs text-slate-400 text-center py-6">
            No messages yet. Type above and ask.
          </div>
        ) : (
          <ul className="space-y-2">
            {messages.map((m, i) => (
              <li key={i} className={'rounded p-2.5 border text-[11px] leading-relaxed ' +
                (m.role === 'ai'
                  ? (m.isError ? 'bg-red-50 border-red-200 text-red-900' : 'bg-white border-slate-300 text-slate-800')
                  : 'bg-slate-100 border-slate-200 text-slate-700')}>
                <div className="flex items-center justify-between mb-1">
                  <span className={'text-[9px] font-bold uppercase tracking-wider ' + (m.role === 'ai' ? 'text-slate-900' : 'text-slate-500')}>
                    {m.role === 'ai' ? m.provider : 'You via ' + m.provider}
                  </span>
                  <span className="text-[9px] text-slate-400">{new Date(m.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                </div>
                <p className="whitespace-pre-wrap">{m.text}</p>
                {m.role === 'user' && (
                  <button onClick={() => setInput(m.text)} className="text-[9px] text-slate-600 hover:text-slate-900 underline mt-1">Reuse</button>
                )}
              </li>
            ))}
          </ul>
        )}
      </div>

    </aside>
  );
}



function App() {
  const [ready, setReady] = useState(false);
  const [loadStatus, setLoadStatus] = useState('Loading SQL engine...');
  const [state, setState] = useState(loadState());
  const [tab, setTab] = useState('problem');
  const [code, setCode] = useState('');
  const [hintOpen, setHintOpen] = useState(false);
  const [showPandas, setShowPandas] = useState(false);
  const [seconds, setSeconds] = useState(0);
  const [runResult, setRunResult] = useState(null);
  const [runError, setRunError] = useState(null);
  const [pyResult, setPyResult] = useState(null);
  const [pyImage, setPyImage] = useState(null);
  const [conceptResult, setConceptResult] = useState(null);
  const [pyError, setPyError] = useState(null);
  const [pyodide, setPyodide] = useState(null);
  const [pyBusy, setPyBusy] = useState(false);
  const [language, setLanguage] = useState('python');
  const [submitState, setSubmitState] = useState(null);
  const [expectedResults, setExpectedResults] = useState({});

  const q = TASKS[state.idx];
  const isConcept = q.type === 'concept';
  const activeSchema = isConcept ? q.example.schema : q.sch;
  const attempt = !isConcept && state.attempts[q.pos] || 0;

  useEffect(() => {
    (async () => {
      try {
        setLoadStatus('Loading SQL engine (sql.js)...');
        const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });
        for (const name of Object.keys(SCHEMAS)) {
          setLoadStatus(`Building ${SCHEMAS[name].full_label} database...`);
          const db = new SQL.Database();
          db.run(SCHEMAS[name].seed);
          dbCache[name] = db;
        }
        setLoadStatus('Computing reference results for all quiz tasks...');
        const expected = {};
        for (const t of TASKS) {
          if (t.type === 'concept') continue;
          try {
            const res = dbCache[t.sch].exec(t.sql);
            expected[t.pos] = res[0] || { columns:[], values:[] };
          } catch (e) {
            console.error('Q failed:', t.pos, e);
            expected[t.pos] = { columns:['error'], values:[[e.message]] };
          }
        }
        setExpectedResults(expected);
        setReady(true);
      } catch (e) {
        setLoadStatus('Error: ' + e.message);
      }
    })();
  }, []);

  useEffect(() => { const i = setInterval(() => setSeconds(s => s+1), 1000); return () => clearInterval(i); }, []);

  useEffect(() => {
    setLanguage('python');
    if (isConcept) {
      setCode((q.try_yourself && q.try_yourself.starter_py) || '# Write Python here. print(...) shows output.\nprint("hello")');
    } else {
      const tables = Object.keys(SCHEMAS[q.sch].tables).join(', ');
      setCode(`# DataFrames are preloaded (pandas is imported as pd).\n# Tables available: ${tables}\n# Write pandas, then END with your answer (a DataFrame / Series / number) — no print needed.\n\n`);
    }
    setHintOpen(false);
    setRunResult(null); setRunError(null); setSubmitState(null);
    setPyResult(null); setPyError(null); setPyImage(null); setConceptResult(null);
    setTab('problem');
  }, [state.idx]);

  const persist = newSt => { setState(newSt); saveState(newSt); };
  const exec = sql => {
    try { const res = dbCache[activeSchema].exec(sql); return { result: res[0] || { columns:[], values:[] }, error: null }; }
    catch (e) { return { result: null, error: e.message }; }
  };
  const ensurePyodide = async () => {
    if (pyodide) return pyodide;
    setPyBusy(true);
    try {
      // eslint-disable-next-line no-undef
      const py = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.29.4/full/' });
      // Export each sql.js DB into Pyodide's filesystem, then load every table
      // into a pandas DataFrame named after the table. Learners write pure
      // pandas against these preloaded frames — no SQL, no pd.read_sql needed.
      try {
        setLoadStatus('Loading pandas + your datasets...');
        for (const name of Object.keys(dbCache)) {
          py.FS.writeFile(name + '.db', dbCache[name].export());
        }
        // Small sample file so the 'Files' lesson can actually read something.
        py.FS.writeFile('data.txt', 'order_id,amount\n1001,45.50\n1002,120.00\n1003,12.90\n1004,210.00\n');
        await py.loadPackage(['pandas', 'sqlite3']);
        const schemas = JSON.stringify(Object.keys(dbCache));
        await py.runPythonAsync(`
import sqlite3, pandas as pd

# _PDS[schema][table] -> the pristine DataFrame for that table.
_PDS = {}
for _s in ${schemas}:
    _c = sqlite3.connect(_s + '.db')
    _tn = [r[0] for r in _c.execute("SELECT name FROM sqlite_master WHERE type='table'")]
    _PDS[_s] = {t: pd.read_sql('SELECT * FROM ' + t, _c) for t in _tn}

# Activate one schema: expose each table as a fresh global DataFrame, plus
# 'pd', a live 'conn', and the short aliases the worked-solution snippets
# assume (df / o / b / g / ap) so revealing a solution actually runs.
def _pds_use(s):
    import sqlite3 as _sq
    g = globals()
    g['pd'] = pd
    g['conn'] = _sq.connect(s + '.db')
    frames = _PDS.get(s, {})
    for _t, _f in frames.items():
        g[_t] = _f.copy()
    _alias = {
        'shopee': {'df': 'shopee_users', 'o': 'orders_regional'},
        'lazada': {'df': 'lazada_users', 'o': 'lazada_orders', 'ol': 'order_lines', 'p': 'products_catalog'},
        'agoda':  {'df': 'guests', 'b': 'bookings', 'g': 'guests', 'ap': 'agoda_properties'},
    }.get(s, {})
    for _k, _t in _alias.items():
        if _t in frames:
            g[_k] = frames[_t].copy()

# Turn an answer (DataFrame / Series / scalar) into one or more equally-valid
# {columns, values} shapes. The grader accepts the learner if ANY shape matches
# the reference — so different-but-equivalent pandas all pass.
def _pds_candidates(x):
    out = []
    def add(d):
        rows = []
        for row in d.itertuples(index=False, name=None):
            rows.append([None if (isinstance(v, float) and pd.isna(v)) else v for v in row])
        out.append({'columns': [str(c) for c in d.columns], 'values': rows})
    if x is None:
        return out
    if isinstance(x, pd.DataFrame):
        add(x.reset_index(drop=True))
        if not isinstance(x.index, pd.RangeIndex):
            add(x.reset_index())                      # index may itself be the answer key
    elif isinstance(x, pd.Series):
        add(x.reset_index())                          # index + value (groupby style)
        add(x.reset_index(drop=True).to_frame())      # values only (distinct / unique)
    else:
        add(pd.DataFrame({'value': [x]}))             # scalar
    return out
`);
      } catch (e) {
        console.warn('Pandas/data init failed:', e);
      }
      setPyodide(py);
      return py;
    } finally {
      setPyBusy(false);
    }
  };
  const runPython = async (codeStr) => {
    setPyBusy(true);
    setPyResult(null); setPyError(null); setPyImage(null);
    let outBuf = [];
    let sig = { errored: false, stdout: '', hasChart: false, error: null };
    try {
      const py = await ensurePyodide();
      try { await py.loadPackagesFromImports(codeStr); } catch (_) { /* ignore */ }
      try { py.runPython(`_pds_use(${JSON.stringify(activeSchema)})`); } catch (_) { /* data not ready */ }
      try { py.runPython("import matplotlib; matplotlib.use('Agg')"); } catch (_) { /* no matplotlib in this lesson */ }
      py.setStdout({ batched: (s) => outBuf.push(s) });
      py.setStderr({ batched: (s) => outBuf.push(s) });
      const ret = await py.runPythonAsync(codeStr);
      let out = outBuf.join('\n');
      if (ret !== undefined && ret !== null) {
        let r = '';
        try { r = (ret && ret.toString) ? ret.toString() : String(ret); } catch (_) {}
        if (ret && ret.destroy) ret.destroy();
        if (r && r !== 'undefined') out = out ? out + '\n' + r : r;
      }
      let fig = null;
      try {
        fig = py.runPython(`
def __cap():
    import sys
    if 'matplotlib' not in sys.modules:
        return None
    import matplotlib.pyplot as plt, io, base64
    if not plt.get_fignums():
        return None
    buf = io.BytesIO()
    plt.gcf().savefig(buf, format='png', dpi=110, bbox_inches='tight')
    plt.close('all')
    return 'data:image/png;base64,' + base64.b64encode(buf.getvalue()).decode()
__cap()
`);
      } catch (_) { /* no figure produced */ }
      sig.hasChart = !!fig;
      if (fig) {
        setPyImage(fig);
        if (/matplotlib|Axes|Figure|Line2D/.test(out)) out = '';
        setPyResult(out ? out : null);
      } else {
        setPyResult(out || '(ran with no output — try adding print(...))');
      }
      sig.stdout = out;
    } catch (e) {
      sig.errored = true; sig.error = e.message || String(e);
      setPyError((outBuf.length ? outBuf.join('\n') + '\n' : '') + (e.message || String(e)));
    } finally {
      setPyBusy(false);
    }
    return sig;
  };
  // Run the learner's pandas against the question's schema and normalise the
  // value of their final expression into a {columns, values} table for grading.
  const gradePandas = async (codeStr, schema) => {
    const py = await ensurePyodide();
    try { await py.loadPackagesFromImports(codeStr); } catch (_) { /* ignore */ }
    let outBuf = [];
    py.setStdout({ batched: (s) => outBuf.push(s) });
    py.setStderr({ batched: (s) => outBuf.push(s) });
    let ans;
    try {
      py.runPython(`_pds_use(${JSON.stringify(schema)})`);
      ans = await py.runPythonAsync(codeStr);
    } catch (e) {
      return { result: null, error: (outBuf.length ? outBuf.join('\n') + '\n' : '') + (e.message || String(e)) };
    }
    let table = null;
    try {
      const conv = py.globals.get('_pds_candidates');
      const proxy = conv(ans);
      if (proxy && proxy.toJs) {
        table = proxy.toJs({ dict_converter: Object.fromEntries });
        proxy.destroy();
      }
      conv.destroy();
    } catch (_) { /* leave table null */ }
    if (ans && ans.destroy) ans.destroy();
    return { result: (table && table[0]) || null, candidates: table || [], error: null, stdout: outBuf.join('\n') };
  };
  const onRun = () => {
    if (!code.trim()) return;
    setSubmitState(null); setConceptResult(null);
    if (language === 'python') {
      runPython(code);
    } else {
      const { result, error } = exec(code);
      setRunResult(result); setRunError(error);
      setPyResult(null); setPyError(null);
    }
  };
  const onAdvance = () => persist({ ...state, idx: Math.min(TASKS.length-1, state.idx+1) });
  const onSubmit = async () => {
    if (isConcept) {
      if (!code.trim()) return;
      setConceptResult(null);
      const sig = await runPython(code);
      const res = checkConcept(q.try_yourself && q.try_yourself.expect, sig);
      setConceptResult(res);
      if (res.pass) persist({ ...state, solved: new Set([...state.solved, q.pos]) });
      return;
    }
    if (!code.trim()) return;
    const { result, candidates, error } = await gradePandas(code, q.sch);
    const exp = expectedResults[q.pos];
    const correct = !error && anyMatch(candidates, exp);
    setSubmitState({ userResult: result, error, correct });
    setRunResult(null); setRunError(null); setPyResult(null); setPyError(null); setPyImage(null);
    if (!correct) persist({ ...state, attempts: { ...state.attempts, [q.pos]: (state.attempts[q.pos] || 0) + 1 } });
  };
  const onReset = () => {
    if (isConcept) {
      setCode((q.try_yourself && q.try_yourself.starter_py) || '# Write Python here.\nprint("hello")');
    } else {
      const tables = Object.keys(SCHEMAS[q.sch].tables).join(', ');
      setCode(`# DataFrames are preloaded (pandas is imported as pd).\n# Tables available: ${tables}\n# Write pandas, then END with your answer (a DataFrame / Series / number) — no print needed.\n\n`);
    }
    setRunResult(null); setRunError(null); setSubmitState(null);
    setPyResult(null); setPyError(null); setPyImage(null);
  };
  const onSkip = () => persist({ ...state, idx: Math.min(TASKS.length-1, state.idx+1) });
  const onBack = () => persist({ ...state, idx: Math.max(0, state.idx-1) });
  const onGrade = g => {
    const newSt = { ...state };
    if (g === 'right') newSt.solved = new Set([...state.solved, q.pos]);
    newSt.idx = Math.min(TASKS.length-1, state.idx+1);
    persist(newSt);
  };
  const setIdx = i => persist({ ...state, idx: i });

  if (!ready) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-slate-50">
        <div className="text-center">
          <div className="inline-block w-8 h-8 border-4 border-slate-200 border-t-orange-500 rounded-full animate-spin mb-4"></div>
          <p className="text-slate-700 font-medium">{loadStatus}</p>
          <p className="text-xs text-slate-500 mt-2">First load fetches sql.js (~1.6MB) from CDN — then everything runs locally.</p>
        </div>
      </div>
    );
  }

  const accent = isConcept ? 'purple' : SCHEMAS[q.sch].accent;
  const accentText = isConcept ? 'text-purple-600 border-purple-500' : ACCENT_TEXT[accent];

  return (
    <div className="h-screen flex bg-slate-50 overflow-hidden">
      <Sidebar idx={state.idx} setIdx={setIdx} solved={state.solved}/>
      <div className="flex-1 flex flex-col min-w-0">
        <Header q={q} idx={state.idx} total={TASKS.length} solved={state.solved.size} seconds={seconds}/>
        <div className="flex-1 grid grid-cols-12 gap-4 p-4 min-h-0">
          <div className={(q.pandas_progress !== undefined || q.chart_progress !== undefined || q.cat === 'setup' ? "col-span-7 " : "col-span-4 ") + "bg-white border border-slate-200 rounded-lg flex flex-col min-h-0 shadow-sm"}>
            <div className="border-b border-slate-200 flex">
              <button onClick={() => setTab('problem')} className={`px-5 py-3 text-sm font-semibold border-b-2 ${tab==='problem' ? accentText : 'border-transparent text-slate-500 hover:text-slate-800'}`}>{isConcept ? 'Lesson' : 'Problem'}</button>
              {!(q.pandas_progress !== undefined || q.chart_progress !== undefined) && (
                <button onClick={() => setTab('schema')} className={`px-5 py-3 text-sm font-semibold border-b-2 ${tab==='schema' ? accentText : 'border-transparent text-slate-500 hover:text-slate-800'}`}>Schema ({SCHEMAS[activeSchema].label})</button>
              )}
            </div>
            <div className="flex-1 overflow-hidden">
              {tab === 'problem'
                ? (isConcept
                    ? <ConceptPanel q={q} onSkipTopic={() => { const cur = q.topic || q.cat; let i = state.idx + 1; while (i < TASKS.length && (TASKS[i].topic || TASKS[i].cat) === cur && TASKS[i].type === 'concept') i++; setIdx(i); }} hasNextTopic={(()=>{ const cur = q.topic || q.cat; for (let i = state.idx+1; i < TASKS.length; i++) { if (TASKS[i].type !== 'concept') return false; if ((TASKS[i].topic || TASKS[i].cat) !== cur) return true; } return false; })()}/>
                    : <ProblemPanel q={q} hintOpen={hintOpen} setHintOpen={setHintOpen} showPandas={showPandas} setShowPandas={setShowPandas}/>)
                : <SchemaPanel schema={activeSchema}/>}
            </div>
          </div>
          <div className={(q.pandas_progress !== undefined || q.chart_progress !== undefined || q.cat === 'setup' ? "col-span-5" : "col-span-8") + " flex min-h-0"}>
            <QueryArea
              q={q} isConcept={isConcept} activeSchema={activeSchema}
              code={code} setCode={setCode}
              onRun={onRun} onSubmit={onSubmit} onReset={onReset} onSkip={onSkip} onBack={onBack}
              canBack={state.idx > 0}
              runResult={runResult} runError={runError}
              submitState={submitState} expectedResult={expectedResults[q.pos]}
              attempt={attempt} onGrade={onGrade} onAdvance={onAdvance}
              language={language} setLanguage={setLanguage}
              pyResult={pyResult} pyError={pyError} pyBusy={pyBusy} pyImage={pyImage} conceptResult={conceptResult}/>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
